/* ---------- WEEK 9 : Big Data (Spark, Hadoop, Cloudera) ---------- */
WEEKS.push({
  n:9, title:"Big Data: Spark, Hadoop & Data Engineering", section:"Big Data",
  summary:"Distributed data processing, Hadoop ecosystem, Apache Spark, batch vs streaming, and data pipelines for payments analytics.",
  days:[
  {
    t:"Big Data Concepts & the Hadoop Ecosystem",
    obj:["Explain the 3 Vs of big data","Understand HDFS & MapReduce","Map the Hadoop/Cloudera ecosystem"],
    exp:`<p>Big data = volume, velocity, variety beyond a single machine. <b>Hadoop</b> pioneered distributed storage (<b>HDFS</b>) and processing (<b>MapReduce</b>) across commodity clusters. <b>Cloudera</b> packages the ecosystem (HDFS, YARN, Hive, Spark, Impala) for enterprises.</p>`,
    articles:[A("Hadoop overview","https://hadoop.apache.org/"),A("HDFS design","https://hadoop.apache.org/docs/stable/hadoop-project-dist/hadoop-hdfs/HdfsDesign.html")],
    videos:[V("Big Data & Hadoop — Simplilearn","https://www.youtube.com/watch?v=CZOSvw3hx40"),V("Hadoop in 5 min","https://www.youtube.com/watch?v=aReuLtY0YMI")],
    refs:[A("Cloudera docs","https://docs.cloudera.com/")],
    lab:"Explore HDFS commands and store a sample transactions dataset.",
    proj:"Design a big-data analytics use case for payments (e.g., fraud analytics).",
    arch:"Diagram HDFS storage across a cluster with replication.",
    qa:[Q("When do you actually need big-data tooling?","When data volume/velocity exceeds what a single node or a traditional RDBMS can handle economically, or you need distributed batch/stream processing. I avoid over-engineering — many 'big data' problems fit in Postgres; I validate scale first.")],
    rev:["I know the 3 Vs","I understand HDFS/MapReduce","I mapped the ecosystem"]
  },
  {
    t:"Apache Spark Fundamentals & RDDs",
    obj:["Explain Spark's model","Understand RDDs & lazy evaluation","Compare Spark to MapReduce"],
    exp:`<p><b>Spark</b> processes data in-memory across a cluster, far faster than disk-based MapReduce. Core abstraction: <b>RDD</b> (resilient distributed dataset) — immutable, partitioned, fault-tolerant via lineage. Transformations are lazy; actions trigger execution.</p>`,
    articles:[A("Spark overview","https://spark.apache.org/docs/latest/"),A("RDD guide","https://spark.apache.org/docs/latest/rdd-programming-guide.html")],
    videos:[V("Apache Spark — Databricks","https://www.youtube.com/watch?v=zC9cnh8rJd0"),V("Spark Full Course — freeCodeCamp","https://www.youtube.com/watch?v=_C8kWso4ne4")],
    refs:[A("Apache Spark docs","https://spark.apache.org/documentation.html")],
    lab:"Run a Spark job counting transactions per merchant over a sample dataset.",
    proj:"Build a Spark batch job for daily payment aggregates.",
    arch:"Diagram driver → executors → partitions.",
    qa:[Q("Why is Spark faster than MapReduce?","It keeps intermediate data in memory and uses a DAG scheduler that optimizes multi-stage jobs, avoiding MapReduce's disk writes between stages. Lineage gives fault tolerance without replication. For iterative/interactive workloads the difference is dramatic.")],
    rev:["I ran a Spark job","I understand RDD lineage","I know lazy vs action"]
  },
  {
    t:"Spark SQL, DataFrames & Datasets",
    obj:["Use DataFrames/Datasets","Query with Spark SQL","Leverage Catalyst optimization"],
    exp:`<p><b>DataFrames</b>/<b>Datasets</b> are higher-level, schema-aware APIs optimized by the <b>Catalyst</b> optimizer and Tungsten engine — usually preferred over raw RDDs. Spark SQL lets you query distributed data with familiar SQL.</p>`,
    articles:[A("Spark SQL guide","https://spark.apache.org/docs/latest/sql-programming-guide.html"),A("DataFrames","https://spark.apache.org/docs/latest/sql-getting-started.html")],
    videos:[V("Spark SQL & DataFrames — Databricks","https://www.youtube.com/watch?v=AoVmgzontXo")],
    refs:[A("Catalyst optimizer","https://databricks.com/glossary/catalyst-optimizer")],
    lab:"Rewrite the aggregation using DataFrames + Spark SQL and compare with the RDD version.",
    proj:"Build the payments analytics with Spark SQL/DataFrames.",
    arch:"Diagram how Catalyst optimizes a query plan.",
    qa:[Q("DataFrame vs RDD — which and why?","DataFrames for almost everything: schema awareness lets Catalyst/Tungsten optimize and reduces boilerplate. I drop to RDDs only for low-level control or unstructured data. Choosing DataFrames also makes code more readable for the team.")],
    rev:["I used DataFrames","I ran Spark SQL","I understand Catalyst"]
  },
  {
    t:"Batch vs Streaming & Structured Streaming",
    obj:["Compare batch vs streaming","Use Spark Structured Streaming","Design for latency needs"],
    exp:`<p><b>Batch</b> processes bounded datasets on a schedule; <b>streaming</b> processes unbounded data continuously. <b>Structured Streaming</b> treats a stream as an ever-growing table, giving the same API for both — ideal for near-real-time fraud/analytics.</p>`,
    articles:[A("Structured Streaming","https://spark.apache.org/docs/latest/structured-streaming-programming-guide.html"),A("Batch vs stream","https://www.confluent.io/learn/batch-vs-real-time-data-processing/")],
    videos:[V("Structured Streaming — Databricks","https://www.youtube.com/watch?v=rl8dIzTpxrI")],
    refs:[A("Lambda vs Kappa architecture","https://www.oreilly.com/library/view/streaming-systems/9781491983867/")],
    lab:"Consume the Kafka charges topic with Structured Streaming and compute rolling counts.",
    proj:"Add streaming fraud-signal aggregation to the pipeline.",
    arch:"Diagram batch (Lambda) vs streaming (Kappa) architectures.",
    qa:[Q("How do you choose batch vs streaming?","By latency requirement and cost. Streaming for seconds-level decisions (fraud, alerts); batch for periodic reporting where minutes/hours are fine and it's cheaper/simpler. Often both (Lambda architecture), though I prefer a unified stream-first (Kappa) approach when feasible.")],
    rev:["I understand batch vs stream","I ran Structured Streaming","I can pick by latency"]
  },
  {
    t:"Data Pipelines, ETL & Data Lakes/Warehouses",
    obj:["Design ETL/ELT pipelines","Compare lake vs warehouse","Ensure data quality"],
    exp:`<p><b>ETL/ELT</b> moves and transforms data into a <b>data warehouse</b> (structured, analytics) or <b>data lake</b> (raw, flexible), increasingly a <b>lakehouse</b>. Orchestrate with tools like Airflow; enforce schema, quality checks, and lineage.</p>`,
    articles:[A("Data lake vs warehouse","https://www.databricks.com/discover/data-lakes"),A("Airflow docs","https://airflow.apache.org/docs/")],
    videos:[V("Data Engineering — freeCodeCamp","https://www.youtube.com/watch?v=PHsC_t0j1dU")],
    refs:[A("The Data Warehouse Toolkit (Kimball)","https://www.kimballgroup.com/")],
    lab:"Sketch and partially build an ETL pipeline landing payments data into a warehouse table.",
    proj:"Design the payments analytics pipeline end-to-end (ingest → process → serve).",
    arch:"Diagram an ETL flow with quality gates.",
    qa:[Q("Data lake vs data warehouse — how do you decide?","Warehouse for structured, governed, high-performance analytics/BI; lake for raw, varied, high-volume data and ML. A lakehouse blends both. I decide by consumers, governance needs, and cost — and I always bake in data-quality checks and lineage regardless.")],
    rev:["I designed an ETL flow","I know lake vs warehouse","I added quality checks"]
  },
  {
    t:"Performance Tuning & Cluster Management",
    obj:["Tune Spark jobs","Avoid shuffles & skew","Manage cluster resources"],
    exp:`<p>Spark performance hinges on minimizing <b>shuffles</b>, handling <b>data skew</b> (salting), right partitioning, caching reused datasets, and tuning executor memory/cores. <b>YARN</b>/K8s schedule cluster resources.</p>`,
    articles:[A("Spark tuning","https://spark.apache.org/docs/latest/tuning.html"),A("Handling skew","https://spark.apache.org/docs/latest/sql-performance-tuning.html")],
    videos:[V("Spark Performance Tuning — Databricks","https://www.youtube.com/watch?v=daXEp4HmS-E")],
    refs:[A("Spark configuration","https://spark.apache.org/docs/latest/configuration.html")],
    lab:"Identify a shuffle-heavy job and optimize partitioning/caching; measure runtime.",
    proj:"Tune the payments analytics job for throughput.",
    arch:"Diagram how a shuffle redistributes data across partitions.",
    qa:[Q("How do you speed up a slow Spark job?","Profile the DAG/stages, reduce and optimize shuffles, fix data skew (salting/broadcast joins), cache reused datasets, right-size partitions and executors, and prefer DataFrames for Catalyst optimization. I measure before/after rather than guessing.")],
    rev:["I reduced a shuffle","I handled skew","I tuned resources"]
  },
  {
    t:"Week 9 Review & Data Pipeline Project",
    obj:["Integrate big-data skills","Ship an analytics pipeline","Self-assess"],
    exp:`<p>Deliver a payments analytics pipeline: ingest events, process with Spark (batch + streaming), and serve aggregates, tuned and documented.</p>`,
    articles:[A("Designing Data-Intensive Applications","https://dataintensive.net/")],
    videos:[V("Apache Spark Full Course — Simplilearn","https://www.youtube.com/watch?v=F8pyaR4uQ2g")],
    refs:[A("Databricks Academy","https://www.databricks.com/learn")],
    lab:"Run the full pipeline on the sample dataset and validate results.",
    proj:"Finalize and document the payments analytics pipeline.",
    arch:"Present the data architecture to a mock panel.",
    qa:[Q("Design a data platform for real-time fraud detection.","Ingest transactions via Kafka, run streaming feature computation (velocity, geo, amount patterns) in Spark/Flink, score against models with low latency, store features in a fast store, and land raw+curated data in a lakehouse for retraining and audit. I'd anchor on latency SLOs, accuracy, and cost.")],
    rev:["Pipeline runs end-to-end","Batch + streaming work","I can present it"]
  }
]});

/* ---------- WEEK 10 : System Design & Design Patterns ---------- */
WEEKS.push({
  n:10, title:"System Design & Design Patterns", section:"System Design",
  summary:"Scalability, caching, load balancing, CAP, design patterns, and structured approaches to large-scale system design interviews.",
  days:[
  {
    t:"System Design Fundamentals & Approach",
    obj:["Structure a design interview","Clarify requirements & scale","Estimate capacity"],
    exp:`<p>A repeatable framework: <b>1)</b> clarify functional + non-functional requirements, <b>2)</b> estimate scale (QPS, storage), <b>3)</b> define APIs, <b>4)</b> high-level design, <b>5)</b> deep-dive components, <b>6)</b> address bottlenecks & trade-offs. Always state assumptions.</p>
    <div class="callout tip"><b>Manager lens:</b> Interviewers assess judgment and communication more than a single 'right' answer. Think out loud and justify trade-offs.</div>`,
    articles:[A("System Design Primer","https://github.com/donnemartin/system-design-primer"),A("Grokking System Design","https://www.educative.io/courses/grokking-the-system-design-interview")],
    videos:[V("System Design Basics — Gaurav Sen","https://www.youtube.com/watch?v=xpDnVSmNFX0"),V("System Design Intro — ByteByteGo","https://www.youtube.com/watch?v=i7twT3x5yv8")],
    refs:[A("ByteByteGo","https://bytebytego.com/")],
    lab:"Do a capacity estimate for a payments API at 10k TPS (storage, bandwidth, servers).",
    proj:"Write a design template you'll reuse for every practice problem.",
    arch:"Diagram the 6-step design approach.",
    qa:[Q("Walk me through how you approach a system design problem.","Clarify functional and non-functional requirements, estimate scale, sketch APIs and a high-level architecture, then deep-dive the hardest components, always calling out trade-offs and failure modes. I anchor on the business constraints — for payments that's consistency, security, and availability.")],
    rev:["I have a design framework","I did a capacity estimate","I state assumptions"]
  },
  {
    t:"Scalability, Load Balancing & Caching",
    obj:["Scale horizontally","Use load balancers","Apply caching strategies"],
    exp:`<p>Scale <b>vertically</b> (bigger box) or <b>horizontally</b> (more boxes + load balancer). <b>Caching</b> (client, CDN, app, DB) cuts latency and load — but invalidation is hard. Know write-through vs write-back and TTL/eviction.</p>`,
    articles:[A("Caching — AWS","https://aws.amazon.com/caching/"),A("Load balancing","https://www.nginx.com/resources/glossary/load-balancing/")],
    videos:[V("Caching — Gaurav Sen","https://www.youtube.com/watch?v=U3RkDLtS7uY"),V("Load Balancing — ByteByteGo","https://www.youtube.com/watch?v=K0Ta65OqQkY")],
    refs:[A("Redis docs","https://redis.io/docs/")],
    lab:"Add a Redis cache to the Payments API read path and measure latency improvement.",
    proj:"Introduce caching + a load balancer to the payments architecture.",
    arch:"Diagram a multi-tier cache (CDN → app → DB).",
    qa:[Q("What are the hard parts of caching?","Invalidation and consistency — stale reads can be dangerous in payments. I choose strategy per use case (write-through for correctness, TTLs for tolerable staleness), guard against thundering herds and cache stampedes, and never cache sensitive data insecurely.")],
    rev:["I added caching","I understand LB options","I know invalidation risks"]
  },
  {
    t:"Databases at Scale, Sharding & CAP",
    obj:["Apply CAP/PACELC","Shard & replicate data","Choose SQL vs NoSQL"],
    exp:`<p><b>CAP</b>: under partition you trade consistency vs availability. <b>Replication</b> scales reads and adds HA; <b>sharding</b> scales writes by partitioning data. Choose SQL for strong consistency/transactions (payments core), NoSQL for scale/flexible schema.</p>`,
    articles:[A("CAP theorem","https://www.ibm.com/topics/cap-theorem"),A("Sharding","https://www.mongodb.com/features/database-sharding-explained")],
    videos:[V("CAP Theorem — Gaurav Sen","https://www.youtube.com/watch?v=Jw1iN1QOChg"),V("Sharding — Hussein Nasser","https://www.youtube.com/watch?v=5faMjKuB9bc")],
    refs:[A("Designing Data-Intensive Applications","https://dataintensive.net/")],
    lab:"Design a sharding key for the transactions table and discuss hotspots.",
    proj:"Plan the data-scaling strategy for the payments platform.",
    arch:"Diagram replication + sharding topology.",
    qa:[Q("How does CAP apply to a payments system?","Core ledger operations need strong consistency (correctness over availability under partition — CP), while read-heavy/analytics paths can favor availability (AP). I split the system so the money-moving path is consistent and transactional, and peripheral features tolerate eventual consistency.")],
    rev:["I understand CAP","I designed a shard key","I can pick SQL vs NoSQL"]
  },
  {
    t:"SOLID Principles & Clean Architecture",
    obj:["Apply SOLID","Separate concerns with layers","Keep dependencies pointing inward"],
    exp:`<p><b>SOLID</b>: Single-responsibility, Open/closed, Liskov substitution, Interface segregation, Dependency inversion. <b>Clean/Hexagonal architecture</b> keeps business logic independent of frameworks/DB, with dependencies pointing inward — testable and adaptable.</p>`,
    articles:[A("SOLID — Baeldung","https://www.baeldung.com/solid-principles"),A("Clean Architecture — Uncle Bob","https://blog.cleancoder.com/uncle-bob/2012/08/13/the-clean-architecture.html")],
    videos:[V("SOLID Principles — Amigoscode","https://www.youtube.com/watch?v=HLFbeC78YlU")],
    refs:[A("Hexagonal architecture","https://alistair.cockburn.us/hexagonal-architecture/")],
    lab:"Refactor a component to satisfy SOLID (e.g., extract an interface, split responsibilities).",
    proj:"Restructure the Payments API toward hexagonal architecture.",
    arch:"Diagram ports/adapters around a domain core.",
    qa:[Q("How do SOLID principles help a team at scale?","They keep modules cohesive, loosely coupled, and open to extension, so large teams change code with less risk and easier testing. As a manager I use them as shared review vocabulary — 'this violates SRP' communicates a concrete, fixable issue.")],
    rev:["I applied SOLID","I separated concerns","I know clean architecture"]
  },
  {
    t:"Creational & Structural Design Patterns",
    obj:["Apply Factory/Builder/Singleton","Use Adapter/Decorator/Facade","Recognize patterns in frameworks"],
    exp:`<p><b>Creational</b> (Factory, Builder, Singleton) manage object creation; <b>Structural</b> (Adapter, Decorator, Facade, Proxy) compose objects. Spring itself is full of these — recognizing them speeds comprehension.</p>`,
    articles:[A("Refactoring.Guru: Patterns","https://refactoring.guru/design-patterns"),A("Java patterns — Baeldung","https://www.baeldung.com/design-patterns-series")],
    videos:[V("Design Patterns — Christopher Okhravi","https://www.youtube.com/playlist?list=PLrhzvIcii6GNjpARdnO4ueTUAVR9eMBpc")],
    refs:[A("GoF Design Patterns","https://en.wikipedia.org/wiki/Design_Patterns")],
    lab:"Use a Builder for a complex Charge object and an Adapter for an external gateway.",
    proj:"Introduce Factory + Strategy for pluggable payment processors.",
    arch:"Diagram a Decorator wrapping a processor with logging/retry.",
    qa:[Q("Give an example where a design pattern genuinely helped.","Strategy + Factory for payment processors let us add a new rail without touching existing code (open/closed), and a Decorator added cross-cutting retry/logging cleanly. Patterns are a means to maintainability, not a goal — I discourage over-patterning.")],
    rev:["I used a creational pattern","I used a structural pattern","I spotted patterns in Spring"]
  },
  {
    t:"Behavioral Patterns & Anti-Patterns",
    obj:["Apply Strategy/Observer/Template","Recognize anti-patterns","Refactor toward maintainability"],
    exp:`<p><b>Behavioral</b> patterns (Strategy, Observer, Template Method, Command, State) manage collaboration and responsibility. Equally important: spotting <b>anti-patterns</b> (God object, spaghetti, premature optimization) and refactoring them out.</p>`,
    articles:[A("Behavioral patterns","https://refactoring.guru/design-patterns/behavioral-patterns"),A("Anti-patterns","https://sourcemaking.com/antipatterns")],
    videos:[V("Strategy & Observer — Christopher Okhravi","https://www.youtube.com/watch?v=v9ejT8FO-7I")],
    refs:[A("Refactoring (Fowler)","https://refactoring.com/")],
    lab:"Implement the Observer pattern for payment status notifications.",
    proj:"Refactor one anti-pattern in the codebase toward a clean pattern.",
    arch:"Diagram a State machine for a payment's lifecycle.",
    qa:[Q("How do you handle a 'God class' a team keeps growing?","Identify its responsibilities, extract cohesive collaborators (SRP), introduce interfaces to decouple, add tests as a safety net, and refactor incrementally behind feature flags. I frame it as reducing change-risk and cognitive load, and schedule it against feature work deliberately.")],
    rev:["I used a behavioral pattern","I spotted an anti-pattern","I refactored it"]
  },
  {
    t:"Week 10 Review & System Design Mock",
    obj:["Integrate design skills","Do a full design mock","Self-assess"],
    exp:`<p>Do a timed end-to-end system design (e.g., "design a payment gateway" or "design a URL shortener") using your framework, then critique your own trade-offs.</p>`,
    articles:[A("System Design Primer — practice","https://github.com/donnemartin/system-design-primer#system-design-interview-questions-with-solutions")],
    videos:[V("Design a Payment System — ByteByteGo","https://www.youtube.com/watch?v=olfaK1lHzm8")],
    refs:[A("System Design Interview (Alex Xu)","https://bytebytego.com/")],
    lab:"Design a payment gateway end-to-end in 45 minutes; capture your diagram and trade-offs.",
    proj:"Produce a written system-design case study you can present.",
    arch:"Present a full payment-gateway design to a mock panel.",
    qa:[Q("Design a payment gateway handling millions of transactions.","Stateless API tier behind a load balancer, idempotent authorization, a strongly consistent ledger (sharded SQL), async events for downstream, caching for reads, resilience patterns, and full observability — plus PCI-compliant security and reconciliation. I'd emphasize consistency and auditability as non-negotiable, then scale reads and peripheral flows.")],
    rev:["I completed a design mock","I documented trade-offs","I can present a design"]
  }
]});

/* ---------- WEEK 11 : Engineering Management, Agile & Leadership ---------- */
WEEKS.push({

    refs:[A("StaffEng","https://staffeng.com/"),A("The Manager's Handbook","https://themanagershandbook.com/")],

    t:"1:1s, Coaching & Growing Engineers",
    obj:["Run effective 1:1s","Coach vs mentor vs direct","Support career growth"],
    exp:`<p><b>1:1s</b> are the manager's most important recurring tool — the engineer's meeting, focused on their growth, blockers, and feedback (both directions). Use <b>coaching</b> (ask questions) for growth, <b>mentoring</b> for expertise, <b>directing</b> when clarity/urgency demands.</p>`,
    articles:[A("High Output Management (Grove)","https://www.goodreads.com/book/show/324750.High_Output_Management"),A("Effective 1:1s","https://larahogan.me/blog/first-one-on-one-questions/")],
    videos:[V("Great 1:1 meetings","https://www.youtube.com/results?search_query=effective+one+on+one+meetings+manager")],
    refs:[A("Radical Candor","https://www.radicalcandor.com/"),A("Lara Hogan blog","https://larahogan.me/blog/")],
    lab:"Design a 1:1 template and a growth-plan format for a mid-level engineer.",
    proj:"Create a career-ladder-aligned development plan for a hypothetical report.",
    arch:"Map a coaching conversation using the GROW model.",
    qa:[Q("How do you help an engineer grow to the next level?","Understand their goals, align to the career ladder, co-create a plan with stretch projects and clear success criteria, give frequent specific feedback, and create visibility for their work. I coach with questions to build their judgment rather than just handing answers.")],
    rev:["I have a 1:1 template","I know coach vs direct","I made a growth plan"]
  },
  {
    t:"Agile, Scrum & Delivery Execution",
    obj:["Run Scrum/Kanban well","Improve flow & predictability","Avoid process theater"],
    exp:`<p>Agile values working software and responding to change. <b>Scrum</b> (sprints, ceremonies) and <b>Kanban</b> (flow, WIP limits) are tools, not religion. Focus on outcomes: predictable delivery, fast feedback, and continuous improvement — not ceremony for its own sake.</p>`,
    articles:[A("Agile Manifesto","https://agilemanifesto.org/"),A("Scrum Guide","https://scrumguides.org/")],
    videos:[V("Agile & Scrum — Simplilearn","https://www.youtube.com/watch?v=9TycLR0TqFA")],
    refs:[A("Kanban","https://www.atlassian.com/agile/kanban"),A("Accelerate (DORA)","https://dora.dev/")],
    lab:"Design a lightweight sprint process for a 6-person team and define its metrics.",
    proj:"Define your team's definition of done, estimation approach, and flow metrics.",
    arch:"Diagram a value stream from idea to production.",
    qa:[Q("How do you improve a team's delivery predictability?","Measure flow (cycle time, throughput, WIP), limit WIP, break work small, protect focus time, and run honest retrospectives that produce real changes. I use DORA metrics as outcome signals and resist process theater — the goal is flow, not ceremony compliance.")],
    rev:["I designed a sprint process","I know Scrum vs Kanban","I defined delivery metrics"]
  },
  {
    t:"Performance Management & Difficult Conversations",
    obj:["Give effective feedback","Handle underperformance","Recognize & retain talent"],
    exp:`<p>Feedback should be timely, specific, and actionable (SBI: Situation-Behavior-Impact). Address <b>underperformance</b> early with clear expectations and support; document and be fair. Equally, actively <b>recognize and retain</b> high performers.</p>`,
    articles:[A("Radical Candor","https://www.radicalcandor.com/"),A("SBI feedback model","https://www.ccl.org/articles/leading-effectively-articles/closing-the-gap-between-intent-and-impact/")],
    videos:[V("Difficult Conversations — manager skills","https://www.youtube.com/results?search_query=manager+difficult+conversations+feedback")],
    refs:[A("Crucial Conversations","https://cruciallearning.com/crucial-conversations-book/")],
    lab:"Role-play a feedback conversation for a missed commitment using SBI.",
    proj:"Draft a fair, supportive performance-improvement plan template.",
    arch:"Map an escalation path from feedback → PIP → decision.",
    qa:[Q("How do you handle an underperforming engineer?","Diagnose root cause (skill, clarity, motivation, or personal factors), set explicit expectations and a support plan with a timeline, give frequent honest feedback, and document fairly. Most people improve with clarity and support; if not, I act decisively and humanely. I never let it fester — it's unfair to the person and the team.")],
    rev:["I can give SBI feedback","I have a PIP template","I plan recognition too"]
  },
  {
    t:"Hiring, Interviewing & Building Teams",
    obj:["Design a fair hiring process","Reduce bias","Build diverse, strong teams"],
    exp:`<p>Hiring is your highest-leverage activity. Define the role and a <b>structured</b>, consistent process (clear rubrics, calibrated interviewers) to reduce bias and improve signal. Prioritize both capability and how a person raises the team's bar and diversity.</p>`,
    articles:[A("Structured interviews — Google re:Work","https://rework.withgoogle.com/guides/hiring-use-structured-interviewing/"),A("Reducing bias","https://rework.withgoogle.com/subjects/unbiasing/")],
    videos:[V("Hiring engineers well","https://www.youtube.com/results?search_query=hiring+software+engineers+structured+interview")],
    refs:[A("Who: The A Method for Hiring","https://www.smartrecruiters.com/")],
    lab:"Design an interview loop + rubric for a senior engineer role.",
    proj:"Write a role scorecard and structured interview guide.",
    arch:"Map a hiring funnel with signal at each stage.",
    qa:[Q("How do you build a strong, diverse engineering team?","Structured hiring with clear rubrics and calibrated interviewers to reduce bias, sourcing from varied pipelines, defining roles by outcomes not pedigree, and creating an inclusive culture where people stay and grow. Diverse teams make better decisions — I treat it as an engineering strength, not a checkbox.")],
    rev:["I designed an interview loop","I built a rubric","I plan for diversity"]
  },
  {
    t:"Technical Strategy, Stakeholders & Communication",
    obj:["Set technical direction","Manage stakeholders & tradeoffs","Communicate up and across"],
    exp:`<p>Managers translate business goals into technical strategy and vice versa. Balance delivery with <b>tech debt</b>, communicate trade-offs to non-technical stakeholders, manage dependencies, and make the team's work and constraints visible. Influence without authority is a core skill.</p>`,
    articles:[A("Managing tech debt","https://martinfowler.com/bliki/TechnicalDebt.html"),A("Communicating up","https://staffeng.com/guides/manage-up/")],
    videos:[V("Technical strategy for EMs","https://www.youtube.com/results?search_query=engineering+manager+technical+strategy")],
    refs:[A("An Elegant Puzzle (Larson)","https://lethain.com/elegant-puzzle/")],
    lab:"Write a one-page technical strategy proposal balancing a feature vs paying down debt.",
    proj:"Draft a stakeholder communication plan for a major initiative.",
    arch:"Map stakeholders by influence/interest.",
    qa:[Q("How do you justify investing in tech debt or infra to non-technical leadership?","I frame it in business terms: risk, velocity, reliability, and cost. E.g., 'this refactor cuts incident rate and doubles delivery speed for the roadmap.' I quantify where possible, tie it to outcomes leaders care about, and propose a balanced allocation rather than an all-or-nothing ask.")],
    rev:["I wrote a strategy one-pager","I can frame debt in business terms","I mapped stakeholders"]
  },
  {
    t:"Week 11 Review & Leadership Scenarios",
    obj:["Integrate management skills","Practice leadership scenarios","Self-assess"],
    exp:`<p>Practice realistic scenarios: a missed deadline, a conflict between two seniors, a reorg, a burned-out star engineer. Structure answers around situation, actions, principles, and outcome.</p>`,
    articles:[A("An Elegant Puzzle","https://lethain.com/elegant-puzzle/"),A("The Manager's Path","https://www.oreilly.com/library/view/the-managers-path/9781491973882/")],
    videos:[V("Leadership scenarios for EMs","https://www.youtube.com/results?search_query=engineering+manager+behavioral+interview")],
    refs:[A("Rands in Repose","https://randsinrepose.com/archives/")],
    lab:"Prepare STAR stories for 5 management scenarios (conflict, delivery risk, growth, hiring, change).",
    proj:"Build a personal 'leadership story bank' mapped to common EM competencies.",
    arch:"Map competencies (people, delivery, strategy, technical) to your stories.",
    qa:[Q("Tell me about a time you resolved a conflict between two senior engineers.","(STAR) I'd describe listening to both privately to understand root causes, finding shared goals, facilitating a direct conversation with ground rules, and aligning on a decision with clear ownership — then following up. The outcome: restored collaboration and a lightweight decision process to prevent recurrence.")],
    rev:["I have 5 STAR stories","I built a story bank","I mapped competencies"]
  }
]});

/* ---------- WEEK 12 : Payments, Mastercard, Behavioral & Mock Interviews ---------- */
WEEKS.push({
  n:12, title:"Payments Domain, Mastercard & Final Prep", section:"Payments Domain",
  summary:"Payments ecosystem, card networks, security/PCI, Mastercard-specific context, behavioral mastery, mock interviews and negotiation.",
  days:[
  {
    t:"Payments Ecosystem & Transaction Lifecycle",
    obj:["Map the payments value chain","Trace authorization→clearing→settlement","Know the key players"],
    exp:`<p>A card transaction flows through: <b>cardholder → merchant → acquirer → network (Mastercard) → issuer</b>. Three phases: <b>authorization</b> (approve/decline in ms), <b>clearing</b> (exchange transaction details), <b>settlement</b> (actual money movement). The network routes and sets rules between banks.</p>`,
    diagram:`<svg viewBox="0 0 660 130"><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="var(--faint)"/></marker></defs>
    <rect class="svg-box" x="8" y="45" width="100" height="44" rx="8"/><text class="svg-t" x="30" y="72">Cardholder</text>
    <line class="svg-line" x1="108" y1="67" x2="150" y2="67"/>
    <rect class="svg-box2" x="150" y="45" width="90" height="44" rx="8"/><text class="svg-t" x="172" y="72">Merchant</text>
    <line class="svg-line" x1="240" y1="67" x2="282" y2="67"/>
    <rect class="svg-box2" x="282" y="45" width="90" height="44" rx="8"/><text class="svg-t" x="300" y="72">Acquirer</text>
    <line class="svg-line" x1="372" y1="67" x2="414" y2="67"/>
    <rect class="svg-box" x="414" y="40" width="110" height="54" rx="8"/><text class="svg-t" x="430" y="63">Mastercard</text><text class="svg-tm" x="440" y="80">Network</text>
    <line class="svg-line" x1="524" y1="67" x2="566" y2="67"/>
    <rect class="svg-box2" x="566" y="45" width="86" height="44" rx="8"/><text class="svg-t" x="592" y="72">Issuer</text></svg>`,
    articles:[A("How card payments work","https://www.mastercard.us/en-us/business/overview/support/how-payments-work.html"),A("Payments 101","https://www.investopedia.com/terms/p/payment-gateway.asp")],
    videos:[V("How Credit Card Payments Work — ByteByteGo","https://www.youtube.com/results?search_query=how+credit+card+payment+works+bytebytego")],
    refs:[A("Mastercard Developers","https://developer.mastercard.com/")],
    lab:"Trace a $50 card purchase through authorization, clearing, and settlement, naming each party.",
    proj:"Map the payments platform you've built onto the real-world value chain.",
    arch:"Diagram the four-party model and money/data flows.",
    qa:[Q("Walk me through what happens when a card is swiped.","The merchant's POS sends an auth request via the acquirer to the network (Mastercard), which routes it to the issuer; the issuer checks funds/fraud and approves or declines in milliseconds. Later, clearing exchanges transaction records and settlement moves the actual funds between banks. The network provides routing, rules, and risk services.")],
    rev:["I know the four-party model","I traced auth/clearing/settlement","I know the players"]
  },
  {
    t:"Card Networks, ISO 8583 & Payment Rails",
    obj:["Understand network switching","Know ISO 8583/20022","Compare payment rails"],
    exp:`<p>Card networks act as a <b>switch</b> connecting thousands of banks with shared rules. Messaging traditionally uses <b>ISO 8583</b> (the card-transaction message standard), with <b>ISO 20022</b> emerging for richer data. Beyond cards, rails include ACH, RTP, wires, and instant payments.</p>`,
    articles:[A("ISO 8583","https://en.wikipedia.org/wiki/ISO_8583"),A("ISO 20022","https://www.iso20022.org/")],
    videos:[V("Payment rails explained","https://www.youtube.com/results?search_query=payment+rails+explained")],
    refs:[A("Mastercard network","https://www.mastercard.com/global/en/business/overview.html")],
    lab:"Study an ISO 8583 message structure and identify key data elements (MTI, PAN, amount).",
    proj:"Design a message model for your platform inspired by ISO standards.",
    arch:"Diagram the network as a switch between issuers and acquirers.",
    qa:[Q("Why do card networks need a standard like ISO 8583?","Thousands of banks and processors must interoperate reliably; a shared message standard defines transaction structure so any issuer/acquirer can communicate. It's why the global system works. Newer ISO 20022 adds richer, structured data for better analytics and compliance.")],
    rev:["I understand network switching","I know ISO 8583/20022","I compared rails"]
  },
  {
    t:"Payment Security, PCI DSS, Fraud & Compliance",
    obj:["Apply PCI DSS principles","Understand tokenization & 3DS","Reason about fraud/risk"],
    exp:`<p>Handling card data requires <b>PCI DSS</b> compliance. Core techniques: <b>tokenization</b> (replace PAN with a token), <b>encryption</b> in transit/at rest, <b>3-D Secure</b> for authentication, and real-time <b>fraud scoring</b>. Minimize data you store; reduce PCI scope.</p>
    <div class="callout warn"><b>Security requirement:</b> never log full PANs/CVVs; encrypt and tokenize sensitive data. This is table stakes at a payments company.</div>`,
    articles:[A("PCI DSS overview","https://www.pcisecuritystandards.org/"),A("Tokenization","https://www.mastercard.us/en-us/business/overview/safety-and-security/tokenization.html")],
    videos:[V("PCI DSS explained","https://www.youtube.com/results?search_query=pci+dss+explained")],
    refs:[A("EMV 3-D Secure","https://www.emvco.com/emv-technologies/3d-secure/"),A("OWASP Top 10","https://owasp.org/www-project-top-ten/")],
    lab:"Review your platform for PCI concerns: what data is stored, how it's protected, what to tokenize.",
    proj:"Add tokenization + encryption to sensitive fields in the payments platform.",
    arch:"Diagram tokenization reducing PCI scope.",
    qa:[Q("How do you design a payment system to be secure and PCI compliant?","Minimize stored card data (tokenize, use a vault), encrypt in transit and at rest, enforce least-privilege access and strong authN/authZ, segment networks, add 3-D Secure and real-time fraud scoring, and continuously audit/monitor. I reduce PCI scope by never touching raw PANs where possible — the safest data is data you don't store.")],
    rev:["I know PCI basics","I understand tokenization/3DS","I never log sensitive data"]
  },
  {
    t:"Mastercard-Specific Preparation",
    obj:["Know Mastercard's business & tech","Align to their values","Prepare company-specific answers"],
    exp:`<p>Research Mastercard deeply: it's a <b>technology company in payments</b>, not a bank — revenue from processing, data/analytics, cybersecurity, and services. Know its priorities: security, scale, reliability, financial inclusion, and 'Priceless' brand. Align your examples to <b>real-time, secure, global-scale</b> systems and their leadership principles.</p>
    <div class="callout tip"><b>Prep tip:</b> Prepare 2-3 stories that showcase building secure, highly available, large-scale systems and leading teams through ambiguity — Mastercard's core context.</div>`,
    articles:[A("Mastercard company overview","https://www.mastercard.com/global/en/vision.html"),A("Mastercard newsroom/tech","https://www.mastercard.com/news/")],
    videos:[V("Inside Mastercard technology","https://www.youtube.com/results?search_query=mastercard+technology+engineering")],
    refs:[A("Mastercard careers/values","https://careers.mastercard.com/"),A("Mastercard Developers","https://developer.mastercard.com/")],
    lab:"Research Mastercard's recent tech initiatives and write 3 talking points relevant to your role.",
    proj:"Tailor your resume + story bank to Mastercard's scale, security, and reliability focus.",
    arch:"Map your experience to Mastercard's engineering priorities.",
    qa:[Q("Why do you want to work at Mastercard as an Engineering Manager?","I'm drawn to building mission-critical systems at global scale where reliability and security are paramount, and to Mastercard's identity as a technology company driving digital payments and inclusion. As an EM I want to lead teams solving hard distributed-systems and security problems that touch billions of transactions — high impact, high standards. (I'd personalize with a specific initiative I admire.)")],
    rev:["I researched Mastercard","I have company-specific stories","I aligned my resume"]
  },
  {
    t:"Behavioral Interview Mastery (STAR & Leadership)",
    obj:["Structure answers with STAR","Cover leadership competencies","Convey impact & self-awareness"],
    exp:`<p>Behavioral interviews probe past behavior as a predictor. Use <b>STAR</b> (Situation, Task, Action, Result) with quantified impact. Prepare stories across competencies: leadership, conflict, failure/learning, delivery under pressure, influence, and hiring/growth. Show self-awareness and what you learned.</p>`,
    articles:[A("STAR method","https://www.themuse.com/advice/star-interview-method"),A("Amazon-style leadership behavioral prep","https://www.themuse.com/advice/behavioral-interview-questions-answers-examples")],
    videos:[V("Behavioral interviews — Jeff H Sipe","https://www.youtube.com/results?search_query=behavioral+interview+manager+STAR")],
    refs:[A("The STAR technique","https://www.indeed.com/career-advice/interviewing/how-to-use-the-star-interview-response-technique")],
    lab:"Write and rehearse 8 STAR stories covering the core EM competencies with metrics.",
    proj:"Record yourself answering 5 behavioral questions; refine for clarity and impact.",
    arch:"Map each story to multiple competencies for reuse.",
    qa:[Q("Tell me about a time you failed and what you learned.","(STAR) I'd pick a real failure — e.g., a launch that missed reliability targets because we underinvested in testing — take clear ownership, explain the concrete changes I drove (test strategy, staged rollout, blameless postmortem culture), and the improved outcome afterward. The point is accountability, learning, and systemic prevention, not blame.")],
    rev:["I have 8 STAR stories","I quantify impact","I show self-awareness"]
  },
  {
    t:"Full Mock Interview Day (Tech + System + Behavioral)",
    obj:["Simulate the real loop","Get end-to-end feedback","Identify gaps"],
    exp:`<p>Run a realistic loop under time pressure: a coding/technical round, a system-design round (e.g., design a payment system), and a behavioral/leadership round. Record, self-assess against a rubric, and note weak areas to revise.</p>`,
    articles:[A("Mock interview guide","https://www.pramp.com/"),A("EM interview loop","https://blog.pragmaticengineer.com/")],
    videos:[V("Mock system design interview — ByteByteGo","https://www.youtube.com/results?search_query=mock+system+design+interview")],
    refs:[A("interviewing.io","https://interviewing.io/"),A("Pramp","https://www.pramp.com/")],
    lab:"Complete a timed 3-round mock (technical, system design, behavioral) and score yourself.",
    proj:"Compile a gap list from the mock and a targeted revision plan for remaining days.",
    arch:"Diagram your interview-day plan and energy management.",
    qa:[Q("How would you design Mastercard's real-time fraud detection at scale?","Ingest transactions via a streaming platform, compute real-time features (velocity, geolocation, spend patterns), score with ML models within the auth latency budget, and combine with rules for explainability. Ensure high availability (fraud can't be the bottleneck), feedback loops for model retraining, and full auditability. I'd anchor on the latency SLA, accuracy/false-positive trade-offs, and security throughout.")],
    rev:["I did a full mock","I scored myself","I have a gap plan"]
  },
  {
    t:"Resume, Salary Negotiation & Final Readiness",
    obj:["Polish an EM-level resume","Negotiate compensation confidently","Finalize readiness"],
    exp:`<p>An EM resume leads with <b>impact and scope</b> (team size, systems, business outcomes), not just tech. For <b>negotiation</b>: know your market value, let them anchor first, negotiate total comp (base, bonus, equity, sign-on), and stay collaborative. Do a final readiness self-assessment across every track.</p>
    <div class="callout tip"><b>Negotiation mindset:</b> Negotiation is expected and professional. The number reflects the role's value, not your worth as a person — negotiate calmly on data.</div>`,
    articles:[A("Salary negotiation — Kalzumeus","https://www.kalzumeus.com/2012/01/23/salary-negotiation/"),A("EM resume tips","https://www.levels.fyi/blog/")],
    videos:[V("Salary negotiation — Patrick McKenzie ideas","https://www.youtube.com/results?search_query=salary+negotiation+software+engineer")],
    refs:[A("levels.fyi (comp data)","https://www.levels.fyi/"),A("Glassdoor salaries","https://www.glassdoor.com/Salaries/index.htm")],
    lab:"Rewrite your resume's top 3 bullets to lead with quantified impact and scope.",
    proj:"Prepare your negotiation script + walk-away number, and complete the readiness meter.",
    arch:"Map your total-comp targets (base/bonus/equity/sign-on).",
    qa:[Q("How do you approach a compensation negotiation?","I research market data (levels.fyi, peers) to know a fair range, let the company anchor first, express genuine enthusiasm, and negotiate the total package collaboratively — base, bonus, equity, sign-on, start date. I anchor on the value I bring and stay positive; it's a business discussion, not a confrontation, and a well-run negotiation starts the relationship on mutual respect.")],

  }
]});
</script>
<script id="app-engine">
/* ============================================================
   APP ENGINE — state, routing, rendering, persistence
   ============================================================ */
(function(){
  "use strict";

  /* ---------- Flatten curriculum ---------- */
  const DAYS = [];   // global day index (1..84)
  WEEKS.forEach(w=>{
    w.days.forEach((d,i)=>{
      const globalDay = (w.n-1)*7 + (i+1);
      d.id = "d"+globalDay;
      d.gday = globalDay;
      d.week = w.n;
      d.dayInWeek = i+1;
      d.section = w.section;
      DAYS.push(d);
    });
  });
  const TOTAL_DAYS = DAYS.length;
  const TOTAL_HOURS_PER_DAY = 2.5;

  const SECTIONS = [...new Set(WEEKS.map(w=>w.section))];

  /* ---------- State / persistence ---------- */
  const LS_KEY = "mc_swe_handbook_v1";
  const defaultState = ()=>({
    done:{}, notes:{}, bookmarks:{}, checks:{},
    status:{},             // dayId -> "must" | "wip" | "skip"
    completedAt:{},        // dayId -> ISO date
    theme:"dark",
    stats:{ videos:{}, articles:{}, projects:{}, questions:{}, mocks:0 }
  });
  let S = load();

  function load(){
    try{ const raw = localStorage.getItem(LS_KEY); if(raw) return Object.assign(defaultState(), JSON.parse(raw)); }catch(e){}
    return defaultState();
  }
  function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){ toast("Storage unavailable"); } }

  /* ---------- Helpers ---------- */
  const $ = s=>document.querySelector(s);
  const el = (tag,cls,html)=>{ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; };
  const esc = s=> (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const doneCount = ()=> Object.values(S.done).filter(Boolean).length;
  const pct = ()=> Math.round(doneCount()/TOTAL_DAYS*100);
  function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }

  function streak(){
    const dates = Object.values(S.completedAt).map(d=>d.slice(0,10));
    if(!dates.length) return 0;
    const set = new Set(dates);
    let s=0; let d=new Date();
    // allow today or yesterday to start the streak
    const iso = x=>x.toISOString().slice(0,10);
    if(!set.has(iso(d))){ d.setDate(d.getDate()-1); if(!set.has(iso(d))) return 0; }
    while(set.has(iso(d))){ s++; d.setDate(d.getDate()-1); }
    return s;
  }

  /* ---------- Section icons ---------- */
  const SECICON = {"Java":"☕","Spring Boot":"🌱","SQL & Performance":"🗄️","Microservices":"🧩","Kafka":"📨",
    "Kubernetes":"☸️","AWS":"☁️","Big Data":"📊","System Design":"🏗️","Engineering Management":"👥","Payments Domain":"💳"};
  const secIcon = s=> SECICON[s] || "📘";

  /* ---------- Reading-list status ---------- */
  const STATUS = {
    must:{ label:"Must read", short:"Must read", icon:"📕", chip:"red" },
    wip: { label:"In progress", short:"WIP", icon:"🚧", chip:"yellow" },
    skip:{ label:"Skip", short:"Skip", icon:"⏭️", chip:"" }
  };
  const STATUS_ORDER = ["must","wip","skip"];
  function setStatus(id, st){
    if(S.status[id]===st) delete S.status[id]; else S.status[id]=st;
    save(); updateBadges();
  }
  function statusChip(id){
    const st = S.status[id]; if(!st||!STATUS[st]) return "";
    return `<span class="chip ${STATUS[st].chip}" title="${STATUS[st].label}">${STATUS[st].icon} ${STATUS[st].short}</span>`;
  }

  /* ============================================================
     ROUTER
     ============================================================ */
  const routes = {};
  function route(name, fn){ routes[name]=fn; }
  function go(name, arg){
    location.hash = "#/"+name + (arg!=null? "/"+arg : "");
  }
  function render(){
    const parts = (location.hash.replace(/^#\//,"")||"dashboard").split("/");
    const name = parts[0]||"dashboard";
    const arg = parts[1];
    const fn = routes[name] || routes.dashboard;
    const view = $("#view");
    view.innerHTML="";
    fn(view, arg);
    // active nav
    document.querySelectorAll(".nav .item").forEach(a=>a.classList.toggle("active", a.dataset.route===name));
    updateBadges();
    window.scrollTo(0,0);
    closeSidebar();
  }
  window.addEventListener("hashchange", render);

  function updateBadges(){
    $("#nav-days").textContent = doneCount()+"/"+TOTAL_DAYS;
    $("#nav-bm").textContent = Object.keys(S.bookmarks).filter(k=>S.bookmarks[k]).length;
    $("#nav-rl").textContent = Object.keys(S.status).filter(k=>S.status[k]).length;
  }

  /* ============================================================
     DASHBOARD
     ============================================================ */
  route("dashboard", (v)=>{
    const p = pct();
    const done = doneCount();
    const hours = (done*TOTAL_HOURS_PER_DAY);
    const nextDay = DAYS.find(d=>!S.done[d.id]) || DAYS[DAYS.length-1];
    const readiness = readinessScore();

    v.appendChild(el("div","page-head",`
      <span class="eyebrow">Manager Software Engineering · Mastercard</span>

  function statCard(k,v,ic,bg){

  /* ============================================================
     CURRICULUM
     ============================================================ */
  let openWeek = 1;
  route("curriculum", (v)=>{
    v.appendChild(el("div","page-head",`<h2>Curriculum</h2><p>12 weeks · ${TOTAL_DAYS} days · blended technical, management & payments every day.</p>`));

    // filters
    const fb = el("div","filterbar");
    const allChip = el("span","chip on","All tracks"); allChip.dataset.sec="all"; fb.appendChild(allChip);

    v.appendChild(fb);
    let filter = "all";
    fb.addEventListener("click",e=>{
      const chip = e.target.closest(".chip"); if(!chip) return;

      fb.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on", c===chip));
      draw();
    });

    const wrap = el("div"); v.appendChild(wrap);
    function draw(){
      wrap.innerHTML="";
      WEEKS.filter(w=> filter==="all" || w.section===filter).forEach(w=>{
        const wd = w.days.filter(d=>S.done[d.id]).length;
        const wp = Math.round(wd/w.days.length*100);
        const block = el("div","week-block"+(w.n===openWeek?" open":""));
        const head = el("div","week-head",`
          <div class="wn">${w.n}</div>
          <div style="flex:1;min-width:0">
            <h3>${esc(w.title)} <span class="chip">${secIcon(w.section)} ${esc(w.section)}</span></h3>
            <p>${esc(w.summary)}</p>

  /* ============================================================

  function openDay(id){ go("day", id.replace("d","")); }

    nav.append(back, rightNav);
    v.appendChild(nav);

    // hero
    const hero = el("div","lesson-hero");

      </div>`;
    v.appendChild(hero);
    hero.querySelector("#toggleDone").onclick=()=>{ toggleDone(d); openDay(d.id); };
    hero.querySelector("#toggleBm").onclick=()=>{ S.bookmarks[d.id]=!S.bookmarks[d.id]; save(); toast(S.bookmarks[d.id]?"Bookmarked":"Removed"); openDay(d.id); };

    // Objectives

    v.appendChild(section("📖","Detailed explanation", `<div class="prose">${expHtml}</div>`));

    // Resources
    v.appendChild(section("🔗","Curated articles", reslist(d.articles,"📄","rgba(79,140,255,.15)")));
    v.appendChild(section("▶️","Curated videos", reslist(d.videos,"🎬","rgba(248,81,73,.15)")));
    v.appendChild(section("📚","Official references", reslist(d.refs,"📘","rgba(63,185,80,.15)")));

    // Hands-on
    v.appendChild(section("🧪","Hands-on lab", `<div class="prose"><p>${d.lab}</p></div>`));
    v.appendChild(section("🚀","Mini project", `<div class="prose"><p>${d.proj}</p></div>`));
    v.appendChild(section("🏗️","Architecture exercise", `<div class="prose"><p>${d.arch}</p></div>`));

    // Interview Q&A
    const qaWrap = el("div");

      q.innerHTML = `<div class="q"><span class="qn">Q${i+1}</span><span>${esc(qa.q)}</span></div>
        <div class="a"><div class="lvl">${esc(qa.lvl)}</div>${esc(qa.a)}</div>`;
      q.querySelector(".q").onclick=()=>q.classList.toggle("open");
      qaWrap.appendChild(q);
    });
    v.appendChild(section("💬","Interview questions & manager-level answers", qaWrap.outerHTML));
    // rebind (outerHTML lost listeners)
    v.querySelectorAll(".qa .q").forEach(q=>q.onclick=()=>q.parentElement.classList.toggle("open"));

    // Revision checklist
    const clWrap = el("div","checklist");
    d.rev.forEach((r,i)=>{
      const key = d.id+"_rev"+i;
      const checked = !!S.checks[key];
      const item = el("div","cl-item"+(checked?" checked":""));
      item.innerHTML = `<span class="box">✓</span><span>${esc(r)}</span>`;
      item.onclick=()=>{ S.checks[key]=!S.checks[key]; save(); item.classList.toggle("checked"); };

    });
    v.appendChild(section("✅","Revision checklist", clWrap.outerHTML));
    // rebind checklist
    const clItems = v.querySelectorAll(".cl-item");
    clItems.forEach((item,i)=>{
      const key = d.id+"_rev"+i;
      item.onclick=()=>{ S.checks[key]=!S.checks[key]; save(); item.classList.toggle("checked"); };
    });

    // Notes
    const notesBox = el("div","section-block");
    notesBox.innerHTML = `<h3><span class="si2">📝</span> My notes (saved locally)</h3>`;
    const ta = el("textarea","notes-area"); ta.placeholder="Write your notes, insights, and questions for this day…";
    ta.value = S.notes[d.id]||"";

    notesBox.appendChild(ta);
    v.appendChild(notesBox);

    // completion footer
    const foot = el("div","card no-print"); foot.style.textAlign="center"; foot.style.marginTop="10px";
    foot.innerHTML = `<p style="margin:0 0 12px;color:var(--muted)">Finished this day's material?</p>`;
    const fbtn = el("button","btn primary", done?"✓ Completed — Next day ›":"Mark complete & continue →");
    fbtn.onclick=()=>{ if(!done) toggleDone(d); if(idx<DAYS.length-1) openDay(DAYS[idx+1].id); else go("dashboard"); };
    foot.appendChild(fbtn);
    v.appendChild(foot);
  });

      <a class="reslink" href="${r.u}" target="_blank" rel="noopener">

        <span class="rt"><b>${esc(r.t)}</b><small>${esc(r.u)}</small></span>
        <span class="rgo">↗</span></a>`).join("")}</div>`;

  function countQA(){ return DAYS.reduce((n,d)=>n+d.qa.length,0); }

  /* ============================================================
     READINESS
     ============================================================ */
  function readinessScore(){
    // weighted: overall completion 60%, checklist depth 25%, notes engagement 15%
    const comp = doneCount()/TOTAL_DAYS;
    const totalChecks = DAYS.reduce((n,d)=>n+d.rev.length,0);
    const doneChecks = Object.values(S.checks).filter(Boolean).length;
    const chk = totalChecks? doneChecks/totalChecks : 0;
    const noted = Object.values(S.notes).filter(n=>n&&n.trim()).length / TOTAL_DAYS;
    return Math.round((comp*0.6 + chk*0.25 + Math.min(noted,1)*0.15)*100);
  }
  function readinessLabel(r){ return r>=85?"Interview ready 🚀":r>=60?"Nearly there":r>=30?"Building momentum":"Just getting started"; }

  route("readiness", (v)=>{
    const r = readinessScore();
    v.appendChild(el("div","page-head",`<h2>Interview Readiness Meter</h2><p>A weighted signal from completion, revision depth, and note-taking.</p>`));
    const top = el("div","card"); top.style.marginBottom="18px";
    top.innerHTML = `<div class="readiness">
        <div class="ring" style="--p:${r};--sz:170px"><div class="rc"><b>${r}%</b><span>${readinessLabel(r)}</span></div></div>
        <div class="bars">
          ${barRow("Curriculum completion", Math.round(doneCount()/TOTAL_DAYS*100))}
          ${barRow("Revision checklist depth", pctChecks())}
          ${barRow("Note-taking engagement", Math.round(Object.values(S.notes).filter(n=>n&&n.trim()).length/TOTAL_DAYS*100))}
        </div>

    v.appendChild(top);

    // readiness by competency area

    const bars = el("div","bars");
    areas.forEach(([name,weeks])=>{

      const dd = days.filter(d=>S.done[d.id]).length;

  function pctChecks(){ const t=DAYS.reduce((n,d)=>n+d.rev.length,0); const c=Object.values(S.checks).filter(Boolean).length; return t?Math.round(c/t*100):0; }

     ============================================================ */
  route("readinglist", (v)=>{
    v.appendChild(el("div","page-head",`<h2>Reading List</h2><p>Days you've labelled <b>Must read</b>, <b>WIP</b> or <b>Skip</b>. Set labels from any lesson, or with the buttons on each card below.</p>`));

    const total = DAYS.filter(d=>S.status[d.id]).length;
    if(!total){ v.appendChild(emptyState("🗂️","Your reading list is empty","Open any day and label it Must read, WIP or Skip — it'll show up here, grouped by label.")); return; }

    STATUS_ORDER.forEach(st=>{
      const days = DAYS.filter(d=>S.status[d.id]===st);
      if(!days.length) return;
      const head = el("div"); head.style.cssText="display:flex;align-items:center;gap:10px;margin:22px 0 12px";
      head.innerHTML = `<span class="chip ${STATUS[st].chip}" style="font-size:13px">${STATUS[st].icon} ${STATUS[st].label}</span>
        <span style="color:var(--muted);font-size:13px">${days.length} day${days.length>1?'s':''}</span>`;
      v.appendChild(head);
      days.forEach(d=>v.appendChild(dayListCard(d,true)));
    });
  });

  /* ============================================================
     NOTES
     ============================================================ */
  route("notes", (v)=>{
    v.appendChild(el("div","page-head",`<h2>My Notes</h2><p>Everything you've written, in one place. Stored locally in your browser.</p>`));
    const noted = DAYS.filter(d=>S.notes[d.id] && S.notes[d.id].trim());
    if(!noted.length){ v.appendChild(emptyState("📝","No notes yet","Open a day and write notes — they'll appear here.")); return; }
    noted.forEach(d=>{
      const c = el("div","card"); c.style.marginBottom="12px"; c.style.cursor="pointer";
      c.innerHTML = `<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <span class="chip brand">${secIcon(d.section)} W${d.week}·D${d.dayInWeek}</span>
        <b style="font-size:14px">${esc(d.t)}</b></div>
        <p style="color:var(--muted);font-size:13px;margin:0;white-space:pre-wrap">${esc(S.notes[d.id]).slice(0,280)}${S.notes[d.id].length>280?'…':''}</p>`;
      c.onclick=()=>openDay(d.id);
      v.appendChild(c);
    });
  });

  /* ============================================================
     INTERVIEW BANK
     ============================================================ */
  route("interview", (v)=>{
    v.appendChild(el("div","page-head",`<h2>Interview Question Bank</h2><p>Every question across the curriculum with manager-level answers — ${countQA()} in total.</p>`));
    const fb = el("div","filterbar");
    const all = el("span","chip on","All"); all.dataset.sec="all"; fb.appendChild(all);
    SECTIONS.forEach(s=>{ const c=el("span","chip",`${secIcon(s)} ${s}`); c.dataset.sec=s; fb.appendChild(c); });
    v.appendChild(fb);
    const wrap = el("div"); v.appendChild(wrap);
    let filter="all";
    function draw(){
      wrap.innerHTML="";
      let n=0;
      DAYS.filter(d=>filter==="all"||d.section===filter).forEach(d=>{
        d.qa.forEach(qa=>{
          n++;
          const q = el("div","qa");
          q.innerHTML = `<div class="q"><span class="qn">${secIcon(d.section)}</span><span>${esc(qa.q)}<br><small style="color:var(--muted);font-weight:400">Week ${d.week} · ${esc(d.t)}</small></span></div>
            <div class="a"><div class="lvl">${esc(qa.lvl)}</div>${esc(qa.a)}</div>`;
          q.querySelector(".q").onclick=()=>q.classList.toggle("open");
          wrap.appendChild(q);
        });
      });
      if(!n) wrap.appendChild(emptyState("💬","No questions","Try another filter."));
    }
    fb.addEventListener("click",e=>{ const c=e.target.closest(".chip"); if(!c)return; filter=c.dataset.sec; fb.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c)); draw(); });
    draw();
  });

  /* ============================================================
     RESUME & NEGOTIATION
     ============================================================ */
  route("resume", (v)=>{
    v.appendChild(el("div","page-head",`<h2>Resume & Salary Negotiation</h2><p>Manager-level positioning and compensation strategy.</p>`));
    const cards = [
      ["📄 EM Resume Principles",[
        "Lead each bullet with <b>impact and scope</b> (team size, systems, business outcome) — not just tech used.",
        "Quantify: 'Led 8 engineers to cut incident rate 40% and ship a payments platform handling 5k TPS.'",
        "Show the arc: technical depth → leadership → business results.",
        "Tailor to Mastercard: scale, security, reliability, real-time payments.",
        "Keep it to 1–2 pages, clean formatting, ATS-friendly."]],
      ["💰 Salary Negotiation Playbook",[
        "Research market value first (levels.fyi, Glassdoor, peers) — know your range.",
        "Let the employer anchor the number first when you can.",
        "Negotiate <b>total compensation</b>: base, bonus, equity, sign-on, start date.",
        "Stay collaborative and enthusiastic — it's a business discussion, not a fight.",
        "Have a walk-away number and a target; get the final offer in writing."]],
      ["🎯 Mastercard Positioning",[
        "Frame yourself around building secure, highly available, global-scale systems.",
        "Prepare 2–3 stories on leading teams through ambiguity and delivering reliably.",
        "Know Mastercard is a technology company — payments, data, cybersecurity, services.",
        "Connect your work to their priorities: security, resilience, financial inclusion.",
        "Ask thoughtful questions about their platform scale and engineering culture."]]
    ];
    cards.forEach(([title,items])=>{
      const c = el("div","card"); c.style.marginBottom="16px";
      c.innerHTML = `<h3 style="margin:0 0 12px;font-size:16px">${title}</h3>
        <ul class="prose">${items.map(i=>`<li>${i}</li>`).join("")}</ul>`;
      v.appendChild(c);
    });
    v.appendChild(el("div","callout tip",`<b>Day 84</b> covers this in depth with interview Q&A. <a data-open="d84">Open the negotiation lesson →</a>`));
  });

  /* ============================================================
     ABOUT
     ============================================================ */
  route("about", (v)=>{
    v.appendChild(el("div","page-head",`<h2>How to use this handbook</h2><p>A self-contained, offline learning portal.</p>`));
    const c = el("div","card");
    c.innerHTML = `<div class="prose">
      <h4>📌 Daily routine (2–3 hrs)</h4>
      <ul>
        <li>Open today's day from the <b>Dashboard</b> "Resume" card or the <b>Curriculum</b>.</li>
        <li>Read objectives → detailed explanation → work the lab & mini project.</li>
        <li>Study the curated articles/videos/references (opens in your browser).</li>
        <li>Reveal the interview questions and rehearse the manager-level answers.</li>
        <li>Tick the revision checklist, write notes, then <b>Mark complete</b>.</li>
      </ul>
      <h4>💾 Your data</h4>
      <p>Progress, notes, bookmarks and checklists are saved in your browser's <code>localStorage</code> — no internet or account needed. Use <b>Export</b> to back up to a JSON file and <b>Import</b> to restore or move devices.</p>
      <h4>✨ Features</h4>
      <ul>
        <li>Dashboard, calendar, analytics & interview readiness meter</li>
        <li>Search (Ctrl/⌘+K), track filters, bookmarks, local notes</li>
        <li>Dark/light mode, printable days (🖨️ → Save as PDF), offline support</li>
        <li>${countQA()} interview questions · ${TOTAL_DAYS} lessons · 12 tracks</li>
      </ul>
      <div class="callout tip"><b>Tip:</b> Print any day to PDF, or use your browser's "Save Page As" to keep a full offline copy.</div>
    </div>`;
    v.appendChild(c);
  });

  /* ---------- shared list card / empty ---------- */
  function dayListCard(d,withStatus){
    const done=!!S.done[d.id];
    const c = el("div","card"); c.style.marginBottom="10px";
    c.innerHTML = `<div style="display:flex;gap:10px;align-items:center;cursor:pointer" data-open="${d.id}">
      <span class="chip brand">${secIcon(d.section)} W${d.week}·D${d.dayInWeek}</span>
      <b style="font-size:14px;flex:1">${esc(d.t)}</b>
      ${statusChip(d.id)}
      <span class="chip ${done?'green':''}">${done?'✓ Done':'Pending'}</span></div>`;
    if(withStatus){
      const bar = el("div"); bar.style.cssText="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap";
      STATUS_ORDER.forEach(k=>{
        const b = el("button","btn "+(S.status[d.id]===k?'primary':'ghost'));
        b.style.fontSize="12px"; b.style.padding="6px 11px";
        b.innerHTML = `${STATUS[k].icon} ${STATUS[k].short}`;
        b.onclick=(e)=>{ e.stopPropagation(); setStatus(d.id,k); render(); };
        bar.appendChild(b);
      });
      c.appendChild(bar);
    }
    return c;
  }
  function emptyState(icon,title,sub){
    const e = el("div","empty"); e.innerHTML=`<div class="big">${icon}</div><h3>${esc(title)}</h3><p>${esc(sub)}</p>`; return e;
  }

  /* ============================================================
     SEARCH
     ============================================================ */
  const searchInput = $("#search");
  const searchResults = $("#searchResults");
  function doSearch(q){
    q = q.trim().toLowerCase();
    if(!q){ searchResults.classList.remove("show"); searchResults.innerHTML=""; return; }
    const hits=[];
    DAYS.forEach(d=>{
      const hay = (d.t+" "+d.section+" "+d.obj.join(" ")+" "+d.qa.map(x=>x.q).join(" ")).toLowerCase();
      if(hay.includes(q)) hits.push({d, label:d.t, sub:`Week ${d.week} · ${d.section}`});
    });
    // question-level hits
    DAYS.forEach(d=>d.qa.forEach(qa=>{ if(qa.q.toLowerCase().includes(q)) hits.push({d,label:qa.q,sub:"Interview Q · "+d.t,qa:true}); }));
    const seen=new Set();
    const uniq = hits.filter(h=>{ const k=h.label+h.d.id; if(seen.has(k))return false; seen.add(k); return true; }).slice(0,12);
    if(!uniq.length){ searchResults.innerHTML=`<div class="sr"><b>No matches</b><small>Try another term</small></div>`; searchResults.classList.add("show"); return; }
    searchResults.innerHTML = uniq.map(h=>`<div class="sr" data-open="${h.d.id}">${h.qa?'💬 ':''}${highlight(h.label,q)}<small>${esc(h.sub)}</small></div>`).join("");
    searchResults.classList.add("show");
  }
  function highlight(text,q){ const i=text.toLowerCase().indexOf(q); if(i<0)return esc(text); return esc(text.slice(0,i))+"<b>"+esc(text.slice(i,i+q.length))+"</b>"+esc(text.slice(i+q.length)); }
  searchInput.addEventListener("input",()=>doSearch(searchInput.value));
  searchInput.addEventListener("focus",()=>{ if(searchInput.value) doSearch(searchInput.value); });
  document.addEventListener("click",e=>{ if(!e.target.closest(".search-wrap")) searchResults.classList.remove("show"); });
  searchResults.addEventListener("click",e=>{ const sr=e.target.closest(".sr"); if(sr&&sr.dataset.open){ openDay(sr.dataset.open); searchInput.value=""; searchResults.classList.remove("show"); } });

  /* ============================================================
     GLOBAL CLICK DELEGATION (data-open / data-nav)
     ============================================================ */
  document.addEventListener("click",e=>{
    const op = e.target.closest("[data-open]"); if(op){ openDay(op.dataset.open); return; }
    const nv = e.target.closest("[data-nav]"); if(nv){ go(nv.dataset.nav); return; }
  });

  /* ============================================================
     THEME
     ============================================================ */
  const themeBtn = $("#themeBtn");
  function applyTheme(t){ document.documentElement.setAttribute("data-theme",t); themeBtn.textContent = t==="dark"?"🌙":"☀️"; S.theme=t; save(); }
  themeBtn.onclick=()=>applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
  applyTheme(S.theme||"dark");

  /* ============================================================
     PRINT / MENU / IMPORT / EXPORT
     ============================================================ */
  $("#printBtn").onclick=()=>window.print();
  const sidebar=$("#sidebar"), backdrop=$("#backdrop");
  function closeSidebar(){ sidebar.classList.remove("open"); backdrop.classList.remove("show"); }
  $("#menuBtn").onclick=()=>{ sidebar.classList.toggle("open"); backdrop.classList.toggle("show"); };
  backdrop.onclick=closeSidebar;

  document.querySelectorAll(".nav .item").forEach(a=>a.onclick=()=>go(a.dataset.route));

  $("#exportBtn").onclick=()=>{
    const blob = new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
    const a = el("a"); a.href=URL.createObjectURL(blob); a.download="mastercard-swe-progress.json"; a.click();
    toast("Progress exported");
  };
  $("#importBtn").onclick=()=>$("#importFile").click();
  $("#importFile").onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{ try{ S=Object.assign(defaultState(),JSON.parse(r.result)); save(); applyTheme(S.theme||"dark"); render(); toast("Progress imported"); }catch(err){ toast("Invalid file"); } };
    r.readAsText(f);
  };

  /* ---------- keyboard: Ctrl/Cmd+K ---------- */
  document.addEventListener("keydown",e=>{
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){ e.preventDefault(); searchInput.focus(); searchInput.select(); }
    if(e.key==="Escape"){ searchResults.classList.remove("show"); closeSidebar(); }
  });

  /* ---------- boot ---------- */
  if(!location.hash) location.hash="#/dashboard";
  render();
  updateBadges();
})();
</script>
</body>
</html>
