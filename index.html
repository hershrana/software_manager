<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manager SWE Master Handbook · Mastercard Prep</title>
<meta name="description" content="Offline interactive 12+ week curriculum for Manager Software Engineering roles." />
<style>
/* ============================================================
   THEME TOKENS
   ============================================================ */
:root{
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: "SF Mono", "Cascadia Code", Consolas, "Roboto Mono", monospace;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 8px 30px rgba(0,0,0,.12);
  --transition: .2s ease;
}
html[data-theme="dark"]{
  --bg:#0d1117; --bg2:#141b25; --bg3:#1b2432; --surface:#161d29;
  --border:#26303e; --text:#e6edf3; --muted:#93a1b5; --faint:#5d6b7d;
  --brand:#ff5f00; --brand2:#f79e1b; --accent:#4f8cff; --green:#3fb950;
  --red:#f85149; --yellow:#e3b341; --purple:#a371f7;
  --card:#141b25; --hover:#1d2734; --chip:#222d3d;
}
html[data-theme="light"]{
  --bg:#f4f6fb; --bg2:#ffffff; --bg3:#eef1f7; --surface:#ffffff;
  --border:#e1e6ef; --text:#1a2230; --muted:#5a6676; --faint:#95a0b0;
  --brand:#eb001b; --brand2:#f79e1b; --accent:#2563eb; --green:#1a7f37;
  --red:#cf222e; --yellow:#bf8700; --purple:#8250df;
  --card:#ffffff; --hover:#f0f3f9; --chip:#eef1f7;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font); background:var(--bg); color:var(--text);
  line-height:1.6; -webkit-font-smoothing:antialiased; transition:background var(--transition),color var(--transition);
}
a{color:var(--accent); text-decoration:none}
a:hover{text-decoration:underline}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ============================================================
   LAYOUT
   ============================================================ */
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
.sidebar{
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;
}
.brand{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center}
.brand .logo{
  width:42px;height:42px;border-radius:11px;flex:0 0 auto;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  display:grid;place-items:center;font-weight:800;color:#fff;font-size:20px;
  box-shadow:0 4px 14px rgba(235,0,27,.35);
}
.brand h1{font-size:15px;margin:0;line-height:1.2}
.brand small{color:var(--muted);font-size:11px}
.nav{padding:10px;overflow-y:auto;flex:1}
.nav .group-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);padding:14px 12px 6px;font-weight:700}
.nav a.item{
  display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--radius-sm);
  color:var(--muted);font-size:13.5px;font-weight:500;cursor:pointer;transition:var(--transition);margin-bottom:2px;
}
.nav a.item:hover{background:var(--hover);color:var(--text);text-decoration:none}
.nav a.item.active{background:linear-gradient(90deg,rgba(255,95,0,.16),transparent);color:var(--text);box-shadow:inset 3px 0 0 var(--brand)}
.nav a.item .ic{width:18px;text-align:center;font-size:15px}
.nav a.item .badge{margin-left:auto;background:var(--chip);color:var(--muted);font-size:10.5px;padding:1px 7px;border-radius:20px;font-weight:700}
.sidebar-foot{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.sidebar-foot button{flex:1}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  padding:12px 26px;display:flex;align-items:center;gap:14px;
}
.topbar .menu-btn{display:none}
.search-wrap{position:relative;flex:1;max-width:520px}
.search-wrap input{
  width:100%;padding:10px 14px 10px 38px;border-radius:30px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:13.5px;outline:none;transition:var(--transition);
}
.search-wrap input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,95,0,.15)}
.search-wrap .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint)}
.search-results{
  position:absolute;top:48px;left:0;right:0;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);max-height:60vh;overflow:auto;display:none;z-index:60;
}
.search-results.show{display:block}
.search-results .sr{padding:11px 15px;border-bottom:1px solid var(--border);cursor:pointer}
.search-results .sr:hover{background:var(--hover)}
.search-results .sr b{color:var(--brand)}
.search-results .sr small{color:var(--muted);display:block;font-size:11.5px}
.topbar .spacer{flex:1}
.iconbtn{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:16px;transition:var(--transition);
  display:grid;place-items:center;
}
.iconbtn:hover{background:var(--hover);border-color:var(--brand)}
.btn{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:9px 15px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;transition:var(--transition);
  display:inline-flex;align-items:center;gap:7px;
}
.btn:hover{background:var(--hover);border-color:var(--brand)}
.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:none}
.btn.primary:hover{filter:brightness(1.07)}
.btn.ghost{background:transparent}
.content{padding:26px 34px 80px;max-width:1120px;width:100%;margin:0 auto;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ============================================================
   COMPONENTS
   ============================================================ */
.page-head{margin-bottom:22px}
.page-head h2{font-size:26px;margin:0 0 6px;letter-spacing:-.02em}
.page-head p{color:var(--muted);margin:0}
.eyebrow{color:var(--brand);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase}

.grid{display:grid;gap:16px}
.grid.c2{grid-template-columns:repeat(2,1fr)}
.grid.c3{grid-template-columns:repeat(3,1fr)}
.grid.c4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:var(--transition)}
.card.hover:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat{display:flex;flex-direction:column;gap:4px}
.stat .k{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
.stat .v{font-size:30px;font-weight:800;letter-spacing:-.02em}
.stat .v small{font-size:14px;color:var(--muted);font-weight:600}
.stat .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:16px}

.progress{height:9px;background:var(--bg3);border-radius:20px;overflow:hidden}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:20px;transition:width .6s ease}
.ring{--p:0;--sz:150px;width:var(--sz);height:var(--sz);border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--brand) calc(var(--p)*1%), var(--bg3) 0);position:relative}
.ring::before{content:"";position:absolute;inset:12px;border-radius:50%;background:var(--card)}
.ring .rc{position:relative;text-align:center}
.ring .rc b{font-size:30px;font-weight:800}
.ring .rc span{font-size:11px;color:var(--muted);display:block}

.chip{display:inline-flex;align-items:center;gap:6px;background:var(--chip);color:var(--muted);
  padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:600;border:1px solid var(--border)}
.chip.brand{background:rgba(255,95,0,.13);color:var(--brand);border-color:transparent}
.chip.green{background:rgba(63,185,80,.14);color:var(--green);border-color:transparent}
.chip.blue{background:rgba(79,140,255,.14);color:var(--accent);border-color:transparent}
.chip.purple{background:rgba(163,113,247,.15);color:var(--purple);border-color:transparent}
.chip.yellow{background:rgba(227,179,65,.15);color:var(--yellow);border-color:transparent}
.chip.red{background:rgba(248,81,73,.15);color:var(--red);border-color:transparent}

/* Week accordion */
.week-block{margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card)}
.week-head{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;transition:var(--transition)}
.week-head:hover{background:var(--hover)}
.week-head .wn{width:44px;height:44px;border-radius:11px;background:var(--bg3);display:grid;place-items:center;font-weight:800;font-size:16px;flex:0 0 auto}
.week-head h3{margin:0;font-size:16px}
.week-head p{margin:2px 0 0;color:var(--muted);font-size:12.5px}
.week-head .wp{margin-left:auto;text-align:right;min-width:120px}
.week-head .wp small{color:var(--muted);font-size:11px}
.week-head .caret{transition:transform var(--transition);color:var(--muted)}
.week-block.open .caret{transform:rotate(90deg)}
.week-days{display:none;padding:6px 14px 14px}
.week-block.open .week-days{display:block}
.day-row{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition)}
.day-row:hover{background:var(--hover)}
.day-row .dnum{width:30px;height:30px;border-radius:8px;background:var(--bg3);display:grid;place-items:center;font-size:12px;font-weight:700;flex:0 0 auto}
.day-row.done .dnum{background:var(--green);color:#fff}
.day-row .dt{flex:1;min-width:0}
.day-row .dt b{font-size:13.5px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-row .dt small{color:var(--muted);font-size:11.5px}
.day-row .dcheck{color:var(--faint);font-size:18px}
.day-row.done .dcheck{color:var(--green)}

/* Lesson view */
.lesson-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px;flex-wrap:wrap}
.lesson-hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:22px;position:relative;overflow:hidden}
.lesson-hero::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,95,0,.18),transparent 70%)}
.lesson-hero h2{margin:8px 0 6px;font-size:24px;letter-spacing:-.02em}
.lesson-hero .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.section-block{margin-bottom:26px}
.section-block > h3{font-size:16px;display:flex;align-items:center;gap:9px;margin:0 0 12px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.section-block > h3 .si2{width:28px;height:28px;border-radius:8px;background:var(--bg3);display:grid;place-items:center;font-size:14px}
.prose{color:var(--text)}
.prose p{margin:0 0 12px}
.prose ul{margin:0 0 12px;padding-left:20px}
.prose li{margin-bottom:6px}
.prose code{background:var(--bg3);padding:2px 6px;border-radius:5px;font-family:var(--mono);font-size:12.5px;color:var(--brand2)}
.prose pre{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;overflow:auto;margin:0 0 14px}
.prose pre code{background:none;padding:0;color:var(--text);font-size:12.5px;line-height:1.7}
.prose h4{margin:18px 0 8px;font-size:14.5px}
.callout{border-left:3px solid var(--brand);background:var(--bg3);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 16px;margin:0 0 14px}
.callout.tip{border-color:var(--green)}
.callout.warn{border-color:var(--yellow)}
.callout b{color:var(--text)}

.reslist{display:flex;flex-direction:column;gap:8px}
.reslink{display:flex;align-items:center;gap:12px;padding:12px 15px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);transition:var(--transition)}
.reslink:hover{border-color:var(--brand);text-decoration:none;background:var(--hover)}
.reslink .ri{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;font-size:15px;flex:0 0 auto}
.reslink .rt{flex:1;min-width:0}
.reslink .rt b{color:var(--text);font-size:13.5px;display:block}
.reslink .rt small{color:var(--muted);font-size:11.5px;word-break:break-all}
.reslink .rgo{color:var(--faint)}

.qa{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden;background:var(--surface)}
.qa .q{padding:14px 16px;cursor:pointer;font-weight:600;font-size:14px;display:flex;gap:11px;align-items:flex-start}
.qa .q .qn{background:var(--chip);color:var(--brand);width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:12px;flex:0 0 auto}
.qa .a{display:none;padding:0 16px 16px 51px;color:var(--muted);font-size:13.5px;border-top:1px solid var(--border);padding-top:14px}
.qa.open .a{display:block}
.qa .a .lvl{color:var(--brand);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em}

.checklist{display:flex;flex-direction:column;gap:6px}
.cl-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);background:var(--surface)}
.cl-item:hover{background:var(--hover)}
.cl-item .box{width:20px;height:20px;border-radius:6px;border:2px solid var(--faint);display:grid;place-items:center;color:transparent;font-size:12px;transition:var(--transition);flex:0 0 auto}
.cl-item.checked .box{background:var(--green);border-color:var(--green);color:#fff}
.cl-item.checked span{color:var(--muted);text-decoration:line-through}

.notes-area{width:100%;min-height:150px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px;color:var(--text);font-family:var(--font);font-size:13.5px;resize:vertical;outline:none}
.notes-area:focus{border-color:var(--brand)}

.readiness{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.bars{flex:1;min-width:280px;display:flex;flex-direction:column;gap:14px}
.bar-row .bl{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;color:var(--muted);font-weight:600}
.bar-row .bl b{color:var(--text)}

.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal .cd{aspect-ratio:1;border:1px solid var(--border);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--transition);background:var(--surface);position:relative;font-size:12px;padding:4px}
.cal .cd:hover{border-color:var(--brand);transform:scale(1.04)}
.cal .cd b{font-size:11px;color:var(--muted)}
.cal .cd .dn{font-size:16px;font-weight:800;margin-top:2px}
.cal .cd.done{background:linear-gradient(135deg,rgba(63,185,80,.18),transparent);border-color:var(--green)}
.cal .cd.done::after{content:"✓";position:absolute;top:4px;right:6px;color:var(--green);font-weight:800;font-size:11px}
.cal-legend{display:flex;gap:16px;margin-top:14px;font-size:12px;color:var(--muted)}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big{font-size:48px;margin-bottom:12px}

.backdrop{display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);
  padding:12px 22px;border-radius:30px;font-weight:600;font-size:13px;box-shadow:var(--shadow);z-index:200;transition:transform .35s cubic-bezier(.2,1.2,.3,1);opacity:.97}
.toast.show{transform:translateX(-50%) translateY(0)}

.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap}
.tabs button{background:none;border:none;color:var(--muted);padding:10px 16px;cursor:pointer;font-size:13.5px;font-weight:600;border-bottom:2px solid transparent;transition:var(--transition)}
.tabs button:hover{color:var(--text)}
.tabs button.active{color:var(--brand);border-bottom-color:var(--brand)}

.diagram{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin:0 0 14px;overflow-x:auto}
.diagram svg{max-width:100%;height:auto;display:block;margin:0 auto}
.svg-box{fill:var(--surface);stroke:var(--brand);stroke-width:1.5}
.svg-box2{fill:var(--bg3);stroke:var(--accent);stroke-width:1.5}
.svg-t{fill:var(--text);font-size:12px;font-family:var(--font);font-weight:600}
.svg-tm{fill:var(--muted);font-size:10px;font-family:var(--font)}
.svg-line{stroke:var(--faint);stroke-width:1.5;fill:none;marker-end:url(#arrow)}

.filterbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.filterbar .chip{cursor:pointer}
.filterbar .chip.on{background:var(--brand);color:#fff;border-color:transparent}

/* Responsive */
@media(max-width:1000px){
  .grid.c4{grid-template-columns:repeat(2,1fr)}
  .grid.c3{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:820px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;width:280px;z-index:100;transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:none}
  .topbar .menu-btn{display:grid}
  .grid.c2,.grid.c3,.grid.c4{grid-template-columns:1fr}
  .content{padding:20px 18px 80px}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
  .backdrop.show{display:block}
}
/* Print */
@media print{
  .sidebar,.topbar,.lesson-nav,.no-print{display:none!important}
  .app{display:block}
  .content{max-width:100%;padding:0}
  .card,.qa,.reslink,.section-block{break-inside:avoid}
  body{background:#fff;color:#000}
  .qa .a{display:block!important}
}
</style>
</head>
<body>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">M</div>
      <div>
        <h1>Manager SWE Handbook</h1>
        <small>Mastercard Prep · Offline</small>
      </div>
    </div>
    <nav class="nav" id="nav">
      <div class="group-label">Overview</div>
      <a class="item" data-route="dashboard"><span class="ic">📊</span> Dashboard</a>
      <a class="item" data-route="curriculum"><span class="ic">📚</span> Curriculum <span class="badge" id="nav-days">84</span></a>
      <a class="item" data-route="calendar"><span class="ic">📅</span> Calendar</a>
      <a class="item" data-route="analytics"><span class="ic">📈</span> Analytics</a>
      <a class="item" data-route="readiness"><span class="ic">🎯</span> Interview Readiness</a>
      <div class="group-label">Study</div>
      <a class="item" data-route="tracks"><span class="ic">🧩</span> Tracks</a>
      <a class="item" data-route="bookmarks"><span class="ic">🔖</span> Bookmarks <span class="badge" id="nav-bm">0</span></a>
      <a class="item" data-route="readinglist"><span class="ic">🗂️</span> Reading List <span class="badge" id="nav-rl">0</span></a>
      <a class="item" data-route="notes"><span class="ic">📝</span> My Notes</a>
      <a class="item" data-route="interview"><span class="ic">💬</span> Interview Bank</a>
      <div class="group-label">Toolkit</div>
      <a class="item" data-route="resume"><span class="ic">📄</span> Resume & Negotiation</a>
      <a class="item" data-route="about"><span class="ic">ℹ️</span> How to use</a>
    </nav>
    <div class="sidebar-foot">
      <button class="btn ghost" id="exportBtn" title="Export progress">⬇ Export</button>
      <button class="btn ghost" id="importBtn" title="Import progress">⬆ Import</button>
      <input type="file" id="importFile" accept="application/json" hidden />
    </div>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <header class="topbar">
      <button class="iconbtn menu-btn" id="menuBtn">☰</button>
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input id="search" type="text" placeholder="Search topics, days, interview questions… (Ctrl/⌘+K)" autocomplete="off" />
        <div class="search-results" id="searchResults"></div>
      </div>
      <div class="spacer"></div>
      <button class="iconbtn" id="printBtn" title="Print / PDF">🖨️</button>
      <button class="iconbtn" id="themeBtn" title="Toggle theme">🌙</button>
    </header>
    <div class="content" id="view"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CURRICULUM DATA  (populated by data.js block below)
   ============================================================ */
</script>
<script id="curriculum-data">
/* ============================================================
   CURRICULUM DATA — 12 weeks · 84 days
   Sections blend: Technical + Engineering Management + Payments
   ============================================================ */
const A = (t,u)=>({t,u});            // article/reference

    obj:["Explain the JVM/JRE/JDK relationship","Trace source → bytecode → native execution","Describe JIT compilation & class loading"],
    exp:`<p>Java's promise is <b>"write once, run anywhere."</b> Your <code>.java</code> source is compiled by <code>javac</code> into platform-neutral <b>bytecode</b> (<code>.class</code>), which the <b>JVM</b> executes on any OS. The <b>JDK</b> = tools (compiler, debugger) + the <b>JRE</b> = JVM + core libraries needed to run.</p>
    <p>At runtime the <b>class loader</b> loads bytecode, the <b>bytecode verifier</b> checks safety, and the <b>interpreter</b> executes it. Hot code paths are promoted by the <b>JIT compiler</b> to native machine code for speed — this is why the JVM often matches C-like throughput after warm-up.</p>

    qa:[Q("What is the difference between JDK, JRE and JVM?","JVM is the abstract runtime that executes bytecode; JRE bundles the JVM with core class libraries to run apps; JDK is the full developer kit (JRE + compiler, javadoc, debugger). As a manager I care that build agents ship a JDK while production containers often ship only a JRE-sized runtime to shrink the image."),Q("Why is Java called platform independent but the JVM platform dependent?","Bytecode is portable; the JVM is a native binary compiled per-OS/architecture that translates that portable bytecode. So the artifact is portable, the runtime is not — which is exactly what lets one build run everywhere.")],

  {
    t:"Variables, Types, Operators & Control Flow",
    obj:["Differentiate primitives vs references","Use casting, autoboxing safely","Write clean control-flow and switch expressions"],
    exp:`<p>Java has 8 <b>primitives</b> (<code>int, long, double, boolean, char, byte, short, float</code>) stored by value, and <b>reference types</b> (objects, arrays) stored as pointers to heap memory. <b>Autoboxing</b> converts <code>int ↔ Integer</code> automatically — convenient but a hidden allocation cost in tight loops.</p>
    <p>Modern Java gives you <b>switch expressions</b> and <b>pattern matching</b> that reduce boilerplate and bugs:</p>
    <pre><code>String grade = switch (score / 10) {

    case 8 -> "B";

};</code></pre>

  {
    t:"OOP Deep Dive: Classes, Objects, Encapsulation",
    obj:["Model real domains with classes","Apply encapsulation & immutability","Use constructors, this, and static correctly"],
    exp:`<p>Object orientation models a domain as collaborating objects. <b>Encapsulation</b> hides internal state behind methods so invariants can't be violated. In payments, a <code>Money</code> or <code>Account</code> object should never expose a mutable balance directly.</p>
    <p><b>Immutability</b> (final fields, no setters) makes objects thread-safe and predictable — a cornerstone of reliable financial systems.</p>
    <pre><code>public final class Money {
    private final long minorUnits;   // cents
    private final String currency;
    public Money(long m, String c){ this.minorUnits=m; this.currency=c; }
    public Money plus(Money o){ /* validate currency */ return new Money(minorUnits+o.minorUnits, currency); }
}</code></pre>`,
    articles:[A("Baeldung: Java OOP","https://www.baeldung.com/java-oop"),A("Oracle: Object-Oriented Concepts","https://docs.oracle.com/javase/tutorial/java/concepts/index.html")],

    qa:[Q("Why prefer immutable objects in financial code?","They are inherently thread-safe, cache-friendly, and prevent accidental state corruption across concurrent transactions. As a manager I push immutability for value objects like Money to eliminate a whole class of concurrency bugs."),Q("What does encapsulation buy a team?","It localizes invariants so callers can't put an object in an invalid state, which reduces defects and lets internals evolve without breaking consumers — critical for large teams sharing domain code.")],

  {
    t:"Inheritance, Polymorphism, Interfaces & Abstraction",
    obj:["Choose composition vs inheritance","Use interfaces & default methods","Apply polymorphism for extensibility"],
    exp:`<p><b>Inheritance</b> models an "is-a" relationship; <b>interfaces</b> define capability contracts. Modern design favors <b>composition over inheritance</b> to avoid rigid hierarchies. Polymorphism lets you code to an interface (<code>PaymentProcessor</code>) and swap implementations (<code>CardProcessor</code>, <code>WalletProcessor</code>) without changing callers.</p>

class CardProcessor implements PaymentProcessor { public Result charge(Money m){...} }</code></pre>

  {

    obj:["Pick the right List/Set/Map","Understand time complexity trade-offs","Use generics for type safety"],
    exp:`<p>The Collections Framework is your daily toolkit. Rules of thumb: <code>ArrayList</code> for indexed access, <code>LinkedList</code> rarely, <code>HashMap</code> for O(1) lookup, <code>TreeMap</code> for sorted keys, <code>HashSet</code> for uniqueness. <b>Generics</b> give compile-time type safety and remove casts.</p>
    <table style="width:100%;border-collapse:collapse;font-size:12.5px" class="prose">

    exp:`<p>Java splits <b>checked</b> exceptions (compiler-enforced, recoverable) from <b>unchecked</b> (RuntimeException, programming errors). <b>try-with-resources</b> auto-closes anything implementing <code>AutoCloseable</code>, preventing leaks.</p>

  {

    exp:`<p>A <b>thread</b> is an independent path of execution. Sharing mutable state across threads without coordination causes <b>race conditions</b>. Threads move through NEW → RUNNABLE → BLOCKED/WAITING → TERMINATED.</p>
    <div class="callout warn"><b>Core problem:</b> two threads incrementing a shared counter can lose updates because <code>count++</code> is read-modify-write, not atomic.</div>`,

/* ---------- WEEK 3 : Spring Boot & Spring Ecosystem ---------- */
WEEKS.push({

  {

  {

    rev:["I secured endpoints","I set up roles","I know authN vs authZ"]
  },
  {

    arch:"Diagram an OAuth2 authorization-code flow.",
    qa:[Q("Why JWT for microservices, and what are the risks?","Stateless validation avoids a central session store and scales horizontally. Risks: token theft (use short expiry + HTTPS), no easy revocation (use short-lived tokens + refresh, or a denylist), and oversized tokens. I weigh these per security requirement.")],
    rev:["I issued a JWT","I validated claims","I understand OAuth2 flow"]
  },
  {

/* ---------- WEEK 4 : Data Layer — SQL, JPA/Hibernate, Performance ---------- */
WEEKS.push({

  summary:"Relational modeling, SQL mastery, ORM with JPA/Hibernate, indexing and query performance tuning.",
  days:[
  {
    t:"Relational Modeling & Normalization",
    obj:["Design normalized schemas","Model relationships & keys","Know when to denormalize"],
    exp:`<p>Normalization (1NF→3NF) removes redundancy and update anomalies. Model entities, primary/foreign keys, and relationships. <b>Denormalize</b> deliberately for read performance when justified by metrics.</p>`,
    articles:[A("Normalization explained","https://www.baeldung.com/cs/db-normalization"),A("Database design basics","https://www.postgresql.org/docs/current/ddl.html")],
    videos:[V("Database Design Course — freeCodeCamp","https://www.youtube.com/watch?v=ztHopE5Wnpc")],

    lab:"Design a normalized schema for accounts, transactions, merchants with keys and constraints.",
    proj:"Create the payments schema with DDL and referential integrity.",
    arch:"Draw an ER diagram of the payments domain.",
    qa:[Q("When would you denormalize?","When read patterns dominate and joins become a proven bottleneck — I'd add derived/duplicated columns or materialized views, but only after measuring, and I keep the source of truth normalized to protect integrity.")],

  },
  {

FROM transactions;</code></pre>`,

    proj:"Build a reporting SQL suite for the payments schema.",
    arch:"Diagram how a JOIN combines rows across tables.",
    qa:[Q("What's the difference between WHERE and HAVING?","WHERE filters rows before aggregation; HAVING filters groups after aggregation. Misusing them causes wrong results or full scans — a common review catch.")],
    rev:["I wrote window functions","I used CTEs","I mastered join types"]
  },
  {
    t:"JPA & Hibernate Fundamentals",
    obj:["Map entities with JPA","Understand the persistence context","Manage relationships"],
    exp:`<p>JPA maps objects to tables; Hibernate is the common implementation. Understand the <b>persistence context</b> (first-level cache), entity lifecycle (transient/managed/detached), and relationship mappings (<code>@OneToMany</code>, <code>@ManyToOne</code>).</p>`,

    lab:"Map Account↔Transaction with JPA and persist via Spring Data repositories.",
    proj:"Replace the in-memory ledger with JPA persistence.",
    arch:"Diagram the entity lifecycle states and transitions.",
    qa:[Q("What is the persistence context?","A first-level cache tied to a transaction that tracks managed entities and flushes changes automatically (dirty checking). Understanding it prevents surprises like stale reads or unexpected updates — key when mentoring teams on ORM.")],
    rev:["I mapped entities","I used a repository","I understand the context"]
  },
  {
    t:"N+1 Problem, Fetching & Caching",
    obj:["Detect & fix N+1 queries","Choose lazy vs eager","Apply second-level caching"],
    exp:`<p>The infamous <b>N+1</b> problem: loading N parents then one query per child. Fix with <code>JOIN FETCH</code>, entity graphs, or batch fetching. Use lazy loading by default; add caching where read-heavy.</p>
    <div class="callout warn"><b>Watch:</b> N+1 is the #1 ORM performance bug in production — enable SQL logging to catch it early.</div>`,
    articles:[A("Baeldung: N+1 problem","https://www.baeldung.com/spring-hibernate-n1-problem"),A("Vlad Mihalcea: Fetching","https://vladmihalcea.com/tutorials/hibernate/")],

    refs:[A("Hibernate caching docs","https://docs.jboss.org/hibernate/orm/current/userguide/html_single/Hibernate_User_Guide.html#caching")],
    lab:"Reproduce an N+1 with lazy associations, then fix with JOIN FETCH; compare query counts.",
    proj:"Optimize the JPA reporting queries to eliminate N+1.",
    arch:"Diagram lazy vs eager fetch and where caching helps.",

  },
  {
    t:"Indexing & Query Optimization",

    exp:`<p>Indexes turn O(n) scans into O(log n) lookups but cost write throughput and storage. Use <code>EXPLAIN ANALYZE</code> to read query plans; index columns used in WHERE/JOIN/ORDER BY. Composite index column order matters.</p>`,
    articles:[A("Use The Index, Luke!","https://use-the-index-luke.com/"),A("PostgreSQL EXPLAIN","https://www.postgresql.org/docs/current/using-explain.html")],
    videos:[V("Database Indexing — Hussein Nasser","https://www.youtube.com/watch?v=-qNSXK7s7_w")],
    refs:[A("Index types (Postgres)","https://www.postgresql.org/docs/current/indexes-types.html")],
    lab:"Add indexes to slow queries and compare EXPLAIN plans before/after.",
    proj:"Tune the payments reporting queries with appropriate indexes.",
    arch:"Diagram a B-tree index lookup.",
    qa:[Q("How do you decide what to index?","Index high-selectivity columns used in filters/joins/sorts, consider composite indexes matching query order, and balance read gains against write cost. I validate with EXPLAIN ANALYZE and real query patterns, not guesses.")],
    rev:["I read a query plan","I added an index","I measured improvement"]
  },
  {
    t:"Transactions, Isolation & Concurrency Control",
    obj:["Apply ACID & isolation levels","Prevent lost updates","Use optimistic vs pessimistic locking"],
    exp:`<p><b>ACID</b> guarantees reliable transactions. Isolation levels (Read Committed → Serializable) trade consistency for concurrency. In payments, prevent double-spend with optimistic (<code>@Version</code>) or pessimistic locking and idempotency keys.</p>`,
    articles:[A("Baeldung: Transaction Isolation","https://www.baeldung.com/spring-transactional-propagation-isolation"),A("Postgres MVCC","https://www.postgresql.org/docs/current/mvcc.html")],
    videos:[V("ACID & Isolation — Hussein Nasser","https://www.youtube.com/watch?v=pomxJOFVcQs")],
    refs:[A("Spring @Transactional","https://docs.spring.io/spring-framework/reference/data-access/transaction.html")],
    lab:"Demonstrate a lost update at Read Committed, then fix with optimistic locking.",
    proj:"Make the payments write path transactional and idempotent.",
    arch:"Diagram optimistic locking with a version column.",
    qa:[Q("How do you prevent double-charging a customer?","Idempotency keys on the request, a unique constraint on the operation, transactional writes, and optimistic locking on the balance. On retry we return the original result instead of charging again — a hard requirement in payments.")],
    rev:["I know isolation levels","I used optimistic locking","I made writes idempotent"]
  },
  {
    t:"Week 4 Review & Data Project",

    exp:`<p>Deliver the Payments API backed by a normalized schema, JPA persistence, tuned queries, and safe transactional writes.</p>`,

    refs:[A("Vlad Mihalcea blog","https://vladmihalcea.com/")],

    rev:["Persistence complete","Queries tuned","Migrations in place"]

]});

/* ---------- WEEK 5 : Microservices Architecture ---------- */
WEEKS.push({
  n:5, title:"Microservices Architecture", section:"Microservices",
  summary:"Decomposition, inter-service communication, resilience patterns, API gateways and distributed data.",
  days:[
  {
    t:"Monolith vs Microservices & Decomposition",
    obj:["Weigh monolith vs microservices","Decompose by bounded context","Avoid distributed-monolith traps"],
    exp:`<p>Microservices split a system into independently deployable services aligned to <b>bounded contexts</b> (DDD). They enable team autonomy and independent scaling — but add distributed-systems complexity. Start monolith-first; split when scaling/team boundaries demand it.</p>
    <div class="callout warn"><b>Anti-pattern:</b> a "distributed monolith" — services that must deploy together — combines the worst of both.</div>`,
    articles:[A("Martin Fowler: Microservices","https://martinfowler.com/articles/microservices.html"),A("MonolithFirst","https://martinfowler.com/bliki/MonolithFirst.html")],
    videos:[V("Microservices Explained — TechWorld with Nana","https://www.youtube.com/watch?v=rv4LlmLmVWk")],
    refs:[A("microservices.io patterns","https://microservices.io/")],
    lab:"Identify bounded contexts in the payments domain and propose service boundaries.",
    proj:"Split the Payments API into 'charges' and 'accounts' services.",
    arch:"Draw a context map of the payments services.",
    qa:[Q("When should a team NOT adopt microservices?","When the domain is small, the team is small, boundaries are unclear, or operational maturity (CI/CD, observability) is lacking — the overhead outweighs benefits. I'd recommend a modular monolith first and split along proven seams.")],
    rev:["I found bounded contexts","I know the distributed-monolith trap","I can justify splitting"]
  },
  {
    t:"Inter-Service Communication: REST, gRPC, Async",
    obj:["Choose sync vs async","Compare REST & gRPC","Design for loose coupling"],
    exp:`<p>Services communicate synchronously (REST/gRPC) or asynchronously (events/messaging). Async decouples and improves resilience; sync is simpler but couples availability. gRPC offers efficient, typed contracts for internal calls.</p>`,
    articles:[A("Baeldung: gRPC","https://www.baeldung.com/grpc-introduction"),A("REST vs gRPC","https://grpc.io/docs/what-is-grpc/introduction/")],
    videos:[V("gRPC vs REST — Hussein Nasser","https://www.youtube.com/results?search_query=grpc+vs+rest+hussein+nasser")],
    refs:[A("gRPC docs","https://grpc.io/docs/")],
    lab:"Call the accounts service from charges via REST, then discuss where async would be better.",
    proj:"Introduce an event for 'ChargeCompleted' between services.",
    arch:"Diagram sync vs async communication trade-offs.",
    qa:[Q("Sync vs async communication — how do you choose?","Sync for immediate consistency needs and simple request/response; async for decoupling, resilience, and load leveling. In payments I use sync for authorization but async events for downstream notifications and analytics.")],
    rev:["I compared REST/gRPC","I added an event","I know coupling trade-offs"]
  },
  {
    t:"API Gateway & Service Discovery",
    obj:["Use an API gateway","Understand service discovery","Centralize cross-cutting concerns"],
    exp:`<p>An <b>API gateway</b> is the single entry point handling routing, auth, rate limiting, and aggregation. <b>Service discovery</b> lets services find each other dynamically (client-side or via the platform, e.g., Kubernetes DNS).</p>`,
    articles:[A("Gateway pattern","https://microservices.io/patterns/apigateway.html"),A("Spring Cloud Gateway","https://spring.io/projects/spring-cloud-gateway")],
    videos:[V("API Gateway — TechWorld with Nana","https://www.youtube.com/watch?v=6ULyxuHKxg8")],
    refs:[A("Service discovery pattern","https://microservices.io/patterns/service-registry.html")],
    lab:"Front both services with an API gateway handling auth and routing.",
    proj:"Add a gateway with rate limiting to the payments services.",
    arch:"Diagram gateway + discovery topology.",
    qa:[Q("What belongs at the gateway vs the service?","Cross-cutting concerns — auth, rate limiting, routing, TLS termination, request aggregation — at the gateway; business logic stays in services. I avoid putting domain logic in the gateway to prevent a new bottleneck/monolith.")],
    rev:["I used a gateway","I understand discovery","I centralized cross-cutting concerns"]
  },
  {
    t:"Resilience: Circuit Breaker, Retry, Bulkhead",
    obj:["Apply resilience patterns","Use Resilience4j","Degrade gracefully"],
    exp:`<p>In distributed systems failures are normal. <b>Circuit breakers</b> stop cascading failures, <b>retries with backoff</b> handle transient faults, <b>bulkheads</b> isolate resources, and <b>timeouts</b> prevent hanging. Resilience4j implements these.</p>`,
    articles:[A("Resilience4j docs","https://resilience4j.readme.io/"),A("Circuit Breaker — Fowler","https://martinfowler.com/bliki/CircuitBreaker.html")],
    videos:[V("Resilience patterns — Java Techie","https://www.youtube.com/watch?v=uk3WHb2ghjU")],
    refs:[A("Release It! patterns","https://pragprog.com/titles/mnee2/release-it-second-edition/")],
    lab:"Wrap the inter-service call with a circuit breaker + retry + timeout.",
    proj:"Make the charges→accounts call resilient with graceful fallback.",
    arch:"Diagram circuit breaker states (closed/open/half-open).",
    qa:[Q("How do you keep a system resilient when a dependency fails?","Timeouts + retries with jittered backoff for transient faults, circuit breakers to stop cascades, bulkheads to isolate, and graceful degradation/fallbacks. I also design for idempotency so retries are safe — essential in payments.")],
    rev:["I added a circuit breaker","I set timeouts","I designed a fallback"]
  },
  {
    t:"Distributed Data: Saga & Eventual Consistency",
    obj:["Manage data across services","Implement the Saga pattern","Reason about consistency"],
    exp:`<p>Each service owns its data — no shared database. Cross-service transactions use the <b>Saga</b> pattern (choreography or orchestration) with compensating actions, accepting <b>eventual consistency</b>.</p>`,
    articles:[A("Saga pattern","https://microservices.io/patterns/data/saga.html"),A("Database per service","https://microservices.io/patterns/data/database-per-service.html")],
    videos:[V("Saga Pattern — Java Techie","https://www.youtube.com/watch?v=xDuwrtwYHu8")],

/* ---------- WEEK 6 : Messaging & Kafka (Event-Driven) ---------- */
WEEKS.push({
  n:6, title:"Messaging & Kafka: Event-Driven Systems", section:"Kafka",
  summary:"Message brokers, Apache Kafka architecture, event-driven design, streams, and exactly-once semantics.",
  days:[
  {
    t:"Messaging Fundamentals & When to Use It",
    obj:["Compare queues vs pub/sub","Understand async messaging benefits","Know delivery guarantees"],
    exp:`<p>Messaging decouples producers from consumers, enabling resilience, load leveling, and scalability. <b>Queues</b> (point-to-point) vs <b>pub/sub</b> (broadcast). Delivery guarantees: at-most-once, at-least-once, exactly-once.</p>`,
    articles:[A("Enterprise Integration Patterns","https://www.enterpriseintegrationpatterns.com/"),A("Messaging basics","https://www.confluent.io/learn/message-queue/")],
    videos:[V("Message Queues — Hussein Nasser","https://www.youtube.com/watch?v=oUJbuFMyBDk")],
    refs:[A("Kafka intro","https://kafka.apache.org/intro")],
    lab:"Map which payment flows should be async vs sync and why.",
    proj:"Design the event model for the payments platform.",
    arch:"Diagram queue vs pub/sub topologies.",
    qa:[Q("Why introduce a message broker?","To decouple services, absorb load spikes (buffering/backpressure), improve resilience (consumers can be down and catch up), and enable event-driven scaling. The trade-off is added operational and consistency complexity, which I weigh explicitly.")],
    rev:["I know queue vs pub/sub","I understand delivery guarantees","I mapped async flows"]
  },
  {
    t:"Kafka Architecture: Topics, Partitions, Brokers",
    obj:["Explain Kafka's core model","Understand partitions & offsets","Reason about ordering & scaling"],
    exp:`<p>Kafka is a distributed, durable log. Producers write to <b>topics</b> split into <b>partitions</b> across <b>brokers</b>; consumers read by <b>offset</b>. Ordering is guaranteed per partition. Partition count sets parallelism.</p>`,
    articles:[A("Kafka design","https://kafka.apache.org/documentation/#design"),A("Confluent: Kafka 101","https://developer.confluent.io/courses/apache-kafka/events/")],
    videos:[V("Apache Kafka in 6 min — Hussein Nasser","https://www.youtube.com/watch?v=Ch5VhJzaoaI")],
    refs:[A("Kafka documentation","https://kafka.apache.org/documentation/")],
    lab:"Run Kafka locally; create a topic with 3 partitions and observe offset progression.",
    proj:"Publish 'ChargeCompleted' events to a Kafka topic.",
    arch:"Diagram producers → partitions → consumer groups.",
    qa:[Q("How does Kafka scale and guarantee ordering?","Partitions provide parallelism and per-partition ordering; a consumer group divides partitions among consumers so each partition has one consumer. To scale you add partitions/consumers, and you choose a partition key (e.g., accountId) to keep related events ordered.")],
    rev:["I created a topic","I understand partitions/offsets","I know ordering guarantees"]
  },
  {
    t:"Producers, Consumers & Consumer Groups",
    obj:["Write producers/consumers","Tune acks & delivery","Balance with consumer groups"],
    exp:`<p>Producers choose <b>acks</b> (0/1/all) trading durability for latency. Consumer groups distribute partitions for horizontal scaling and enable rebalancing. Commit offsets carefully to control delivery semantics.</p>`,
    articles:[A("Spring for Apache Kafka","https://docs.spring.io/spring-kafka/reference/"),A("Confluent consumer guide","https://developer.confluent.io/courses/apache-kafka/consumers/")],
    videos:[V("Kafka with Spring Boot — Java Techie","https://www.youtube.com/watch?v=SqVfCyfCJqw")],
    refs:[A("Kafka producer configs","https://kafka.apache.org/documentation/#producerconfigs")],
    lab:"Build a Spring Kafka producer and a consumer group with 2 instances.",
    proj:"Consume ChargeCompleted to update a read model.",
    arch:"Diagram consumer group rebalancing.",
    qa:[Q("What does acks=all guarantee and its cost?","The leader waits for all in-sync replicas to persist the record before acknowledging, giving strong durability (no data loss on broker failure) at the cost of higher latency. For payments events I favor acks=all with idempotent producers.")],
    rev:["I built producer/consumer","I tuned acks","I scaled with a group"]
  },
  {
    t:"Event-Driven Architecture & Event Sourcing",
    obj:["Design event-driven flows","Understand event sourcing & CQRS","Model events as facts"],
    exp:`<p><b>Event-driven architecture</b> models the system as reactions to events (facts about what happened). <b>Event sourcing</b> stores state as an append-only event log; <b>CQRS</b> separates write and read models for scalability.</p>`,
    articles:[A("Event Sourcing — Fowler","https://martinfowler.com/eaaDev/EventSourcing.html"),A("CQRS — Fowler","https://martinfowler.com/bliki/CQRS.html")],
    videos:[V("Event Driven Architecture — TechWorld with Nana","https://www.youtube.com/watch?v=STKCRSUsyP0")],
    refs:[A("microservices.io: event sourcing","https://microservices.io/patterns/data/event-sourcing.html")],
    lab:"Model the payment lifecycle as events and rebuild state by replaying them.",
    proj:"Add an event-sourced audit log for charges.",
    arch:"Diagram CQRS write vs read paths.",
    qa:[Q("What are the benefits and costs of event sourcing?","Benefits: complete audit trail, temporal queries, easy rebuild/replay — excellent for payments compliance. Costs: complexity, eventual consistency, schema evolution of events, and read models to maintain. I adopt it where auditability truly justifies the complexity.")],
    rev:["I modeled events as facts","I understand CQRS","I built an audit log"]
  },
  {
    t:"Exactly-Once, Idempotency & Dead Letters",
    obj:["Achieve reliable processing","Design idempotent consumers","Handle poison messages"],
    exp:`<p>At-least-once delivery means duplicates happen — make consumers <b>idempotent</b> (dedupe by key). Kafka supports idempotent producers and transactions for effectively exactly-once. Route unprocessable messages to a <b>dead-letter topic</b>.</p>`,
    articles:[A("Kafka exactly-once","https://www.confluent.io/blog/exactly-once-semantics-are-possible-heres-how-apache-kafka-does-it/"),A("Idempotent consumers","https://microservices.io/patterns/communication-style/idempotent-consumer.html")],
    videos:[V("Kafka Exactly Once — Confluent","https://www.youtube.com/watch?v=fbcUf_Za_9M")],
    refs:[A("Dead letter queues","https://www.confluent.io/blog/error-handling-patterns-in-kafka/")],
    lab:"Make the consumer idempotent and add a dead-letter topic for failures.",
    proj:"Guarantee no duplicate charges under redelivery.",
    arch:"Diagram idempotent consumer + DLQ flow.",
    qa:[Q("How do you guarantee a payment event is processed exactly once?","At-least-once delivery plus idempotent consumers keyed on a unique event/idempotency ID, or Kafka transactions for read-process-write atomicity. Duplicates are deduped, failures go to a DLQ for investigation. True exactly-once end-to-end requires idempotency at every step.")],
    rev:["I made consumers idempotent","I added a DLQ","I understand exactly-once"]
  },
  {
    t:"Kafka Streams & Real-Time Processing",
    obj:["Process streams in real time","Use windowing & aggregations","Build a stream topology"],
    exp:`<p><b>Kafka Streams</b> processes topics as continuous streams — filtering, joining, aggregating with time windows — enabling real-time fraud scoring, metrics, and enrichment without a separate cluster.</p>`,
    articles:[A("Kafka Streams docs","https://kafka.apache.org/documentation/streams/"),A("Streams concepts","https://developer.confluent.io/courses/kafka-streams/get-started/")],
    videos:[V("Kafka Streams — Confluent","https://www.youtube.com/watch?v=A9KQufGb4_A")],
    refs:[A("ksqlDB","https://ksqldb.io/")],
    lab:"Build a stream that counts charges per merchant in 1-minute windows.",
    proj:"Add real-time transaction volume metrics via Kafka Streams.",
    arch:"Diagram a stream topology with windowed aggregation.",
    qa:[Q("Where would you use stream processing in payments?","Real-time fraud detection, velocity checks, live dashboards, and enrichment — anywhere decisions must be made within seconds on a continuous flow. I'd weigh it against batch for cost and latency requirements.")],
    rev:["I built a stream","I used windowing","I understand real-time use cases"]
  },
  {
    t:"Week 6 Review & Event-Driven Project",
    obj:["Integrate messaging skills","Ship an event-driven feature","Self-assess"],
    exp:`<p>Deliver an event-driven payments feature: reliable Kafka events, idempotent consumers, a read model, and a real-time metric.</p>`,
    articles:[A("Kafka: The Definitive Guide","https://www.confluent.io/resources/kafka-the-definitive-guide/")],
    videos:[V("Kafka Full Course — Confluent","https://www.youtube.com/watch?v=Ch5VhJzaoaI")],
    refs:[A("Confluent Developer","https://developer.confluent.io/")],
    lab:"End-to-end test the event pipeline including failure/DLQ paths.",
    proj:"Finalize and document the event-driven payments pipeline.",
    arch:"Present the event-driven architecture to a mock panel.",
    qa:[Q("Design an event-driven notification system for payments.","Emit domain events (ChargeCompleted) to Kafka, partition by account for ordering, idempotent consumers to build notifications, DLQ for failures, and monitoring on lag. I'd ensure PII handling, retention, and replayability for audits.")],
    rev:["Pipeline works end-to-end","DLQ handled","I can present it"]
  }
]});

/* ---------- WEEK 7 : Containers, Docker & Kubernetes ---------- */
WEEKS.push({
  n:7, title:"Containers, Docker & Kubernetes", section:"Kubernetes",
  summary:"Containerization, image best practices, Kubernetes orchestration, deployments, scaling and self-healing.",
  days:[
  {
    t:"Containers & Docker Fundamentals",
    obj:["Explain containers vs VMs","Build a Docker image","Run and network containers"],
    exp:`<p>Containers package an app with its dependencies into an isolated, portable unit sharing the host kernel — lighter than VMs. Docker builds <b>images</b> (layered, immutable) that run as <b>containers</b>. Solves "works on my machine."</p>`,
    articles:[A("Docker: Get Started","https://docs.docker.com/get-started/"),A("Containers vs VMs","https://www.docker.com/resources/what-container/")],

    proj:"Containerize the payments service with a proper Dockerfile.",
    arch:"Diagram image layers and the container runtime.",
    qa:[Q("How do containers differ from VMs?","Containers virtualize the OS and share the host kernel, so they start in ms and are lightweight; VMs virtualize hardware with a full guest OS, offering stronger isolation at higher cost. I pick containers for density/speed and reserve VMs for strong isolation needs.")],
    rev:["I built an image","I ran a container","I know containers vs VMs"]
  },
  {
    t:"Dockerfile Best Practices & Multi-Stage Builds",
    obj:["Write efficient Dockerfiles","Use multi-stage builds","Secure & shrink images"],
    exp:`<p>Optimize layer caching, use <b>multi-stage builds</b> to keep runtime images small, run as non-root, pin versions, and scan for vulnerabilities. A lean image deploys faster and has a smaller attack surface.</p>
    <pre><code>FROM eclipse-temurin:21-jdk AS build
COPY . . && RUN ./gradlew bootJar
FROM eclipse-temurin:21-jre
COPY --from=build /app/build/libs/*.jar app.jar
USER 1000
ENTRYPOINT ["java","-jar","/app.jar"]</code></pre>`,
    articles:[A("Dockerfile best practices","https://docs.docker.com/develop/develop-images/dockerfile_best-practices/"),A("Multi-stage builds","https://docs.docker.com/build/building/multi-stage/")],
    videos:[V("Docker Best Practices — TechWorld with Nana","https://www.youtube.com/watch?v=8vXoMqWgbQQ")],
    refs:[A("Distroless images","https://github.com/GoogleContainerTools/distroless")],
    lab:"Convert to a multi-stage build; compare image sizes before/after.",
    proj:"Produce a hardened, minimal image for the payments service.",
    arch:"Diagram a multi-stage build pipeline.",
    qa:[Q("How do you make container images production-ready?","Multi-stage builds for small images, non-root user, pinned base versions, minimal/distroless base, vulnerability scanning in CI, no secrets baked in, and a healthcheck. Smaller, hardened images reduce attack surface and deploy time.")],
    rev:["I used multi-stage build","I run as non-root","I scanned the image"]
  },
  {
    t:"Kubernetes Architecture & Core Objects",
    obj:["Explain K8s control plane","Understand Pods/ReplicaSets/Deployments","Use declarative manifests"],
    exp:`<p>Kubernetes orchestrates containers across a cluster. The <b>control plane</b> (API server, scheduler, controller manager, etcd) drives desired state; <b>nodes</b> run <b>Pods</b>. You declare desired state; K8s reconciles reality to match.</p>`,
    articles:[A("K8s concepts","https://kubernetes.io/docs/concepts/"),A("K8s components","https://kubernetes.io/docs/concepts/overview/components/")],
    videos:[V("Kubernetes in 100s — Fireship","https://www.youtube.com/watch?v=PziYflu8cB8"),V("Kubernetes Tutorial — TechWorld with Nana","https://www.youtube.com/watch?v=X48VuDVv0do")],
    refs:[A("Kubernetes docs","https://kubernetes.io/docs/home/")],
    lab:"Deploy the payments image as a Deployment with 3 replicas on a local cluster (kind/minikube).",
    proj:"Write K8s manifests (Deployment + Service) for the payments service.",
    arch:"Diagram the control plane and node components.",
    qa:[Q("What does Kubernetes give you over plain Docker?","Declarative desired-state orchestration: self-healing, rolling updates, autoscaling, service discovery, load balancing, and config/secret management across a cluster. It turns 'run a container' into 'operate a resilient service.'")],
    rev:["I deployed to K8s","I wrote manifests","I understand the control plane"]
  },
  {
    t:"Services, Ingress, ConfigMaps & Secrets",
    obj:["Expose apps with Services/Ingress","Manage config with ConfigMaps","Handle secrets securely"],
    exp:`<p><b>Services</b> give stable networking to ephemeral Pods; <b>Ingress</b> routes external HTTP. <b>ConfigMaps</b>/<b>Secrets</b> externalize config. Secrets should be encrypted at rest and injected, never baked into images.</p>`,
    articles:[A("K8s Services","https://kubernetes.io/docs/concepts/services-networking/service/"),A("ConfigMaps & Secrets","https://kubernetes.io/docs/concepts/configuration/secret/")],
    videos:[V("K8s Services & Ingress — TechWorld with Nana","https://www.youtube.com/watch?v=T4Z7visMM4E")],
    refs:[A("Ingress","https://kubernetes.io/docs/concepts/services-networking/ingress/")],
    lab:"Expose the service via Ingress and inject config via ConfigMap + Secret.",
    proj:"Externalize payments config/secrets in K8s.",
    arch:"Diagram traffic: Ingress → Service → Pods.",
    qa:[Q("How do you manage secrets in Kubernetes securely?","Store as Secrets with encryption-at-rest enabled, restrict via RBAC, avoid committing them, and ideally integrate an external manager (Vault/CSI driver) so secrets are injected at runtime and rotated. Never bake secrets into images or env in git.")],
    rev:["I used a Service/Ingress","I externalized config","I handled secrets safely"]
  },
  {
    t:"Scaling, Self-Healing & Rolling Deployments",
    obj:["Configure autoscaling","Use probes for self-healing","Do zero-downtime deploys"],
    exp:`<p>K8s self-heals via <b>liveness/readiness probes</b> and restarts. The <b>Horizontal Pod Autoscaler</b> scales on CPU/metrics. <b>Rolling updates</b> deploy without downtime; combine with resource requests/limits for stability.</p>`,
    articles:[A("HPA","https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/"),A("Probes","https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/")],
    videos:[V("K8s Autoscaling — TechWorld with Nana","https://www.youtube.com/watch?v=jM36M39MA3I")],
    refs:[A("Rolling updates","https://kubernetes.io/docs/tutorials/kubernetes-basics/update/update-intro/")],
    lab:"Add liveness/readiness probes and an HPA; trigger a rolling update.",
    proj:"Make the payments deployment self-healing and autoscaling.",
    arch:"Diagram a rolling update replacing pods gradually.",
    qa:[Q("How do you achieve zero-downtime deployments?","Rolling updates with readiness probes so traffic only hits ready pods, sensible maxSurge/maxUnavailable, graceful shutdown handling in-flight requests, and health checks. For risky changes I use canary/blue-green. This keeps payments available during deploys.")],
    rev:["I added probes","I configured HPA","I did a rolling update"]
  },
  {
    t:"Helm, GitOps & Cluster Operations",
    obj:["Package apps with Helm","Understand GitOps","Operate clusters safely"],
    exp:`<p><b>Helm</b> templates and versions K8s manifests as reusable charts. <b>GitOps</b> (Argo CD/Flux) makes git the source of truth — the cluster continuously reconciles to the repo, giving auditable, revertible deployments.</p>`,
    articles:[A("Helm docs","https://helm.sh/docs/"),A("GitOps principles","https://opengitops.dev/")],
    videos:[V("Helm — TechWorld with Nana","https://www.youtube.com/watch?v=-ykwb1d0DXU"),V("GitOps with Argo CD","https://www.youtube.com/watch?v=MeU5_k9ssrs")],
    refs:[A("Argo CD","https://argo-cd.readthedocs.io/")],
    lab:"Package the payments manifests as a Helm chart with values per environment.",
    proj:"Set up a GitOps flow deploying the payments chart.",
    arch:"Diagram a GitOps reconciliation loop.",
    qa:[Q("What is GitOps and why adopt it?","Git becomes the single source of truth for desired state; an operator continuously reconciles the cluster to match. Benefits: auditability, easy rollback (git revert), consistency across environments, and reduced config drift. It's how I'd standardize deployments across many teams.")],
    rev:["I built a Helm chart","I understand GitOps","I can operate a cluster"]
  },
  {
    t:"Week 7 Review & Container Platform Project",
    obj:["Integrate container/K8s skills","Ship a cloud-native deployment","Self-assess"],
    exp:`<p>Deliver the payments service running on Kubernetes: hardened image, Helm chart, probes, autoscaling, and GitOps delivery.</p>`,

    refs:[A("CNCF landscape","https://landscape.cncf.io/")],

    arch:"Present the deployment architecture to a mock panel.",
    qa:[Q("How do you run a Java service reliably on Kubernetes?","Right-sized resource requests/limits, JVM container-awareness flags, liveness/readiness/startup probes, HPA, rolling/canary deploys, externalized config/secrets, and observability. I treat resilience and cost as first-class, validated by load and chaos tests.")],

  bucket = "payments-ledger-\${var.env}"
}</code></pre>`,

  {

    videos:[V("CI/CD — TechWorld with Nana","https://www.youtube.com/watch?v=scEDHsr3APg")],
    refs:[A("GitHub Actions","https://docs.github.com/en/actions"),A("GitLab CI","https://docs.gitlab.com/ee/ci/")],

  {
